<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        #display { width: 100%; height: 100vh; }
        .content-frame { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <div id="display"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data'); 
        const display = document.getElementById('display');

        if (data && data.startsWith('canva:')) {
            const id = data.split(':')[1].trim();
            // L'attributo referrerpolicy="no-referrer" è fondamentale qui
            display.innerHTML = `
                <iframe class="content-frame" 
                        src="https://www.canva.com/design/${id}/view?embed" 
                        allow="autoplay" 
                        referrerpolicy="no-referrer">
                </iframe>`;
        } else if (data) {
            // Fallback per link diretti se non iniziano con canva:
            display.innerHTML = `<iframe class="content-frame" src="${data}" referrerpolicy="no-referrer"></iframe>`;
        }
    </script>
</body>
</html>
