<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision - Vertical H24</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            background-color: #0a192f; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #brand-top { text-align: center; padding: 15px 0 5px 0; font-size: 1.5em; font-weight: 900; letter-spacing: 6px; color: #ffffff; }
        #brand-top span { color: #00ff88; }

        /* HEADER (25%) */
        #header { 
            height: 25vh;
            padding: 20px; 
            text-align: center; 
            border-bottom: 12px solid #00ff88; 
            position: relative; 
            display: flex; flex-direction: column; justify-content: center;
            box-sizing: border-box;
            flex-shrink: 0;
            transition: all 0.5s ease;
        }

        #clock { 
            position: absolute; top: 15px; right: 25px; 
            font-family: monospace; font-size: 2.2em; color: #00ff88; font-weight: bold; 
        }

        /* STATI COLORE APERTO/CHIUSO */
        .header-aperto { background: #064e3b !important; border-bottom-color: #00ff88 !important; }
        .header-chiuso { background: #b91c1c !important; border-bottom-color: #ffffff !important; }

        #header-nome { 
            font-size: 4.8em; 
            margin: 10px 0; 
            text-transform: uppercase; 
            font-weight: 900; 
            line-height: 1;
            display: flex; align-items: center; justify-content: center; gap: 25px;
        }

        /* CROCI GRECHE DINAMICHE */
        .croce { color: #00ff88; font-size: 0.9em; animation: pulse 2s infinite; }
        .header-chiuso .croce { color: white !important; }
        .header-chiuso #clock { color: white !important; }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        #header-orario { font-size: 2.5em; color: #ffffff; font-weight: 800; text-transform: uppercase; }
        #header-note { font-size: 1.8em; color: #00ff88; margin-top: 10px; font-weight: 600; font-style: italic; }
        .header-chiuso #header-note { color: white !important; }

        /* BODY (55%) */
        #container-main { 
            height: 55vh;
            padding: 40px; 
            overflow-y: auto; 
            box-sizing: border-box;
        }

        .titolo-sezione { 
            border-left: 12px solid #00ff88; 
            padding-left: 25px; 
            margin-bottom: 40px; 
            font-size: 1.8em; 
            color: #8892b0; 
            font-weight: bold; 
            text-transform: uppercase;
            line-height: 1.3;
        }

        /* CARD TURNI */
        .card {

            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 25px; margin-bottom: 35px;
        }
