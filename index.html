<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a192f; color: white; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* LAYOUT */
        #header { height: 20vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 8px solid #00ff88; position: relative; flex-shrink: 0; }
        #container-main { height: 55vh; padding: 20px; overflow-y: auto; flex-grow: 1; }
        #footer-promo { height: 25vh; background: white; color: #b91c1c; display: flex; justify-content: center; align-items: center; border-top: 8px solid #00ff88; flex-shrink: 0; }

        /* HEADER & CROCI */
        #clock { position: absolute; top: 10px; right: 20px; font-size: 1.8rem; color: #00ff88; font-family: monospace; }
        #nome-farma { font-size: 2.8rem; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; gap: 20px; }
        .croce { color: #00ff88; font-size: 1.1em; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; }
        .chiuso .croce, .chiuso #clock { color: white !important; }

        /* NUOVO: TITOLO SEZIONE TURNI */
        #titolo-turni { text-align: center; color: #00ff88; font-size: 2rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        /* CARD: TESTO SX, QR DX */
        .card { 
            background: #172a45; margin-bottom: 25px; padding: 20px; 
            border-radius: 20px; border: 2px solid #233554; 
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-info { flex: 1; text-align: left; }
        .card h3 { color: #00ff88; font-size: 2.2rem; text-transform: uppercase; margin: 0; }
        .card p { font-size: 1.6rem; color: #cbd5e1; font-weight: 600; margin-top: 5px; }

        .qr-wrapper { background: white; padding: 8px; border-radius: 12px; margin-left: 20px; flex-shrink: 0; }
        .qr-wrapper img { width: 130px; height: 130px; display: block; }

        #promo-text { font-size: 4.5rem; font-weight: 900; text-transform: uppercase; text-align: center; line-height: 1; }
    </style>
</head>
<body>

    <div id="header">
        <div id="clock">--:--:--</div>
        <h1 id="nome-farma">
            <span class="croce">&#10010;</span>
            <span id="txt-nome">RICERCA ID...</span>
            <span class="croce">&#10010;</span>
        </h1>
        <div id="stato-orario" style="font-size:1.6rem; font-weight:bold; margin-top:5px;">SINCRONIZZAZIONE IN CORSO</div>
    </div>

    <div id="container-main">
        <h2 id="titolo-turni">FARMACIE DI TURNO H24</h2>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo"><div id="promo-text">OFFERTE</div></div>

    <script>
        // MODIFICA: LETTURA DINAMICA DELL'ID DALLA URL
        const urlParams = new URLSearchParams(window.location.search);
        const MIO_ID = urlParams.get('id') || "RM001"; 

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        function isAperta(cella) {
            if (!cella) return false;
            const s = cella.toUpperCase();
            if (s.includes("H24") || s.includes("APERTO")) return true;
            try {
                const adesso = new Date();
                const min = adesso.getHours() * 60 + adesso.getMinutes();
                const fasce = s.split(',');
                for (let f of fasce) {
                    const p = f.trim().split('-');
                    if (p.length === 2) {
                        const mS = parseInt(p[0].split(':')[0])*60 + (parseInt(p[0].split(':')[1])||0);
                        const mE = parseInt(p[1].split(':')[0])*60 + (parseInt(p[1].split(':')[1])||0);
                        if (min >= mS && min <= mE) return true;
                    }
                }
            } catch(e) { return false; }
            return false;
        }

        async function carica() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            try {
                const res = await fetch(url + "&t=" + Date.now());
                const txt = await res.text();
                const righe = txt.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                
                let turniHtml = "";
                const giorno = new Date().getDay(); 

                for (let i = 1; i < righe.length; i++) {
                    const r = righe[i];
                    if (!r[1]) continue;

                    if (r[0] === MIO_ID && r[17] === "O") {
                        document.getElementById('txt-nome').innerText = r[1];
                        const orario = (giorno === 0) ? r[14] : (giorno === 6 ? r[13] : r[12]);
                        const aperta = isAperta(orario);
                        document.getElementById('header').className = aperta ? 'aperto' : 'chiuso';
                        document.getElementById('stato-orario').innerText = aperta ? "APERTO: " + orario : "ATTUALMENTE CHIUSA";
                    } 
                    
                    else if (r[17] === "T") {
                        const qr = r[4] ? `<div class="qr-wrapper"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(r[4])}"></div>` : "";
                        turniHtml += `
                            <div class="card">
                                <div class="card-info">
                                    <h3>${r[1]}</h3>
                                    <p>${r[2]}</p>
                                </div>
                                ${qr}
                            </div>`;
                    }
                }
                document.getElementById('body-turni').innerHTML = turniHtml;
            } catch(e) { console.error(e); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateClock();
            carica();
            setInterval(carica, 45000);
            
            const promo = ["SCONTO 20% SOLARI", "PRESSIONE GRATUITA", "ECG IMMEDIATO"];
            let pIdx = 0;
            setInterval(() => {
                const promoEl = document.getElementById('promo-text');
                if (promoEl) {
                    promoEl.innerText = promo[pIdx];
                    pIdx = (pIdx + 1) % promo.length;
                }
            }, 5000);
        });
    </script>
</body>
</html>
