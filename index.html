<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision 00174 - Vertical Mode</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #0a192f; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #brand-top { text-align: center; padding: 20px 0 10px 0; font-size: 1.8em; font-weight: 900; letter-spacing: 8px; color: #ffffff; }
        #brand-top span { color: #00ff88; }

        #header { 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 10px solid #00ff88; 
            position: relative; 
            transition: all 0.5s; 
            flex-shrink: 0; 
        }

        #clock { 
            position: absolute; 
            top: 20px; 
            right: 30px; 
            font-family: monospace; 
            font-size: 2.2em; 
            color: #00ff88; 
            font-weight: bold; 
        }

        .header-aperto { background: #064e3b !important; border-bottom-color: #00ff88 !important; }
        .header-chiuso { background: #ff0000 !important; border-bottom-color: #ffffff !important; }

        #header-nome { 
            font-size: 5.2em; 
            margin: 30px 0; 
            text-transform: uppercase; 
            font-weight: 900; 
            line-height: 1.1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px; /* Spazio tra croci e testo */
        }

        /* CROCI GRECHE RIPRISTINATE */
        .croce { 
            color: #00ff88; 
            font-size: 1.2em; 
            animation: pulse 2s infinite; 
        }
        .header-chiuso .croce { color: white; }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #header-orario { font-size: 2.5em; color: #ffffff; margin-top: 20px; font-weight: 800; text-transform: uppercase; }
        #header-note { font-size: 2em; color: #00ff88; margin-top: 15px; font-weight: 600; font-style: italic; }
        .header-chiuso #header-note { color: white; }

        #container-main { 
            padding: 40px 30px; 
            flex-grow: 1; 
            overflow-y: auto; 
        }

        .titolo-sezione { 
            border-left: 10px solid #00ff88; 
            padding-left: 25px; 
            margin-bottom: 40px; 
            font-size: 1.8em; 
            color: #8892b0; 
            font-weight: bold; 
            text-transform: uppercase; 
            line-height: 1.3;
        }

        #body-turni { display: flex; flex-direction: column; gap: 30px; }

        .card { 
            background: #172a45; 
            padding: 35px; 
            border-radius: 20px; 
            border: 2px solid #233554; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            gap: 20px;
        }

        .card-info h3 { margin: 0; color: #00ff88; font-size: 3em; }
        .card-info p { margin: 15px 0 0 0; color: #cbd5e1; font-size: 1.8em; }

        .qr-container { 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            width: fit-content;
        }
        .qr-container img { width: 180px; height: 180px; display: block; }
        .qr-label { font-size: 1.2em; color: #0a192f; font-weight: 900; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="header" class="header-aperto">
        <div id="brand-top">FARMA<span>VISION</span></div>
        <div id="clock">00:00:00</div>
        <h1 id="header-nome">
            <span class="croce">&#10010;</span>
            <span id="nome-farma">...</span>
            <span class="croce">&#10010;</span>
        </h1>
        <div id="header-orario">VERIFICA ORARI...</div>
        <div id="header-note"></div>
    </div>

    <div id="container-main">
        <div class="titolo-sezione">ELENCO DELLE FARMACIE DI TURNO CHE EFFETTUANO SERVIZIO ASSISTENZIALE H24</div>
        <div id="body-turni"></div>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

            if (!rangeStr || rangeStr.trim() === "" || rangeStr.includes("APERTO")) return false;

                const parti = rangeStr.split('-');
                if(parti.length !== 2) return false;
                const [gI, mI] = parti[0].trim().split('/');
                const [gF, mF] = parti[1].trim().split('/');
                const inizio = new Date(oggi.getFullYear(), parseInt(mI) - 1, parseInt(gI));
