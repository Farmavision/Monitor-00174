<script>
    // Funzione per controllare le ferie (Colonna P / Indice 15)
    function isFerie(rangeStr) {
        if (!rangeStr || rangeStr.length < 5) return false;
        try {
            const oggi = new Date(); oggi.setHours(0,0,0,0);
            const parti = rangeStr.split('-');
            if(parti.length < 2) return false;
            const [di, mi] = parti[0].trim().split('/'); 
            const [df, mf] = parti[1].trim().split('/');
            const inizio = new Date(oggi.getFullYear(), mi-1, di);
            const fine = new Date(oggi.getFullYear(), mf-1, df);
            return oggi >= inizio && oggi <= fine;
        } catch(e) { return false; }
    }

    async function aggiorna() {
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
        const urlParams = new URLSearchParams(window.location.search);
        const mioID = (urlParams.get('id') || "RM001").toUpperCase();

        try {
            const res = await fetch(url + "?t=" + Date.now());
            const txt = await res.text();
            // Parsing robusto delle righe CSV
            const righe = txt.split(/\r?\n/).map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
            
            // Mappatura precisa
            const MAP = { ID:0, NOME:1, ADDR:2, LINK:4, L_V:9, SAB:10, DOM:11, FER:15, SERV:17 };
            const container = document.getElementById('body-turni');
            container.innerHTML = '';
            const giorno = new Date().getDay(); // 0=Dom, 1=Lun...

            righe.forEach((r, idx) => {
                if (idx === 0 || !r[MAP.NOME]) return;

                // Gestione Farmacia Principale (Header)
                if (r[MAP.ID].toUpperCase() === mioID && r[MAP.SERV] === "O") {
                    document.getElementById('header-nome').innerText = r[MAP.NOME];
                    
                    // Seleziona l'orario in base al giorno della settimana
                    let orarioOggi = (giorno === 0) ? r[MAP.DOM] : (giorno === 6 ? r[MAP.SAB] : r[MAP.L_V]);
                    
                    // Controllo Ferie prioritario
                    if (isFerie(r[MAP.FER])) {
                        document.getElementById('header').className = "header-chiuso";
                        document.getElementById('header-orario').innerText = "CHIUSO PER FERIE";
                    } 
                    // Controllo Chiusura
                    else if (!orarioOggi || orarioOggi.toUpperCase().includes("CHIUSO")) {
                        document.getElementById('header').className = "header-chiuso";
                        document.getElementById('header-orario').innerText = "OGGI: CHIUSO";
                    } 
                    // Stato Aperto
                    else {
                        document.getElementById('header').className = "header-aperto";
                        document.getElementById('header-orario').innerText = "OGGI: " + orarioOggi;
                    }
                } 
                // Gestione Farmacie di Turno (Body)
                else if (r[MAP.SERV] === "T") {
                    const qr = r[MAP.LINK] ? `<div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(r[MAP.LINK])}"></div>` : "";
                    container.innerHTML += `<div class="card"><h3>${r[MAP.NOME]}</h3><p>${r[MAP.ADDR]}</p>${qr}</div>`;
                }
            });
        } catch(e) { 
            console.error("Errore critico:", e);
            document.getElementById('header-orario').innerText = "ERRORE DATI";
        }
    }

    // Orologio semplificato HH:MM
    function clock() { 
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0'); 
    }
    
    setInterval(clock, 1000); 
    clock();
    aggiorna(); 
    setInterval(aggiorna, 45000); // Aggiorna ogni 45 secondi

    // Rotazione Promo Footer
    const promo = ["SCONTO 30% SOLARI", "PROMO INTEGRATORI 1+1", "SCOPRI I NOSTRI SERVIZI", "PRESSIONE GRATIS"];
    let pIdx = 0;
    setInterval(() => { 
        const el = document.getElementById('adv-content');
        el.style.opacity = 0;
        setTimeout(() => {
            el.innerText = promo[pIdx];
            el.style.opacity = 1;
            pIdx = (pIdx + 1) % promo.length;
        }, 500);
    }, 8000);
</script>
