    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        function checkRangeDate(rangeStr) {
            if (!rangeStr || !rangeStr.includes('-')) return false;
            const oggi = new Date(); oggi.setHours(0,0,0,0);
            try {
                const [inizio, fine] = rangeStr.split('-').map(d => {
                    const [gg, mm] = d.trim().split('/');
                    return new Date(oggi.getFullYear(), mm - 1, gg);
                });
                if (fine < inizio) fine.setFullYear(fine.getFullYear() + 1);
                return oggi >= inizio && oggi <= fine;
            } catch(e) { return false; }
        }

        function getStatoOrario(stringaOrario) {
            const s = stringaOrario.toUpperCase().trim();
            if (s.includes("CHIUSO")) return { chiuso: true, riapertura: "" };
            if (s.includes("H24") || s === "APERTO") return { chiuso: false, riapertura: "" };
            
            const oraAttuale = new Date();
            const minAdesso = oraAttuale.getHours() * 60 + oraAttuale.getMinutes();
            const ranges = s.split(',');
            let riaperturaProssima = "";
            let trovatoAperto = false;

            for (let r of ranges) {
                const parti = r.trim().split('-');
                if (parti.length === 2) {
                    const [hI, mI] = parti[0].trim().split(':').map(Number);
                    const [hF, mF] = parti[1].trim().split(':').map(Number);
                    const inizio = hI * 60 + mI;
                    const fine = hF * 60 + mF;

                    if (minAdesso >= inizio && minAdesso <= fine) {
                        trovatoAperto = true;
                        break;
                    }
                    if (inizio > minAdesso && riaperturaProssima === "") {
                        riaperturaProssima = parti[0].trim();
                    }
                }
            }
            return { chiuso: !trovatoAperto, riapertura: riaperturaProssima };
        }
