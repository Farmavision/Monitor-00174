<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="900">
    <title>Monitor Farmacia Universale</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a192f; color: white; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            cursor: none !important; /* <--- IL MOUSE DIVENTA INVISIBILE QUI */
        }

        /* --- LAYOUT 18-50-32 --- */
        #header { 
            flex: 0 0 18vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-bottom: 6px solid #00ff88; position: relative;
            padding: 5px 0;
            transition: background-color 0.5s ease;
        }

        #container-main { 
            flex: 0 0 50vh; 
            padding: 20px; 
            overflow-y: auto; 
        }

        #footer-promo {
            flex: 0 0 32vh; 
            width: 100%;
            background-color: white; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- STILI HEADER --- */
        #clock { font-size: 1.2rem; color: #00ff88; font-weight: bold; position: absolute; top: 10px; right: 20px; }
        
        .label-static { 
            font-size: 1.6rem; 
            color: #ffffff; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: -10px;
            opacity: 0.8;
        }

        #txt-nome { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
            font-size: 3.8rem; 
            font-weight: 900; 
            color: #ffffff; 
            text-transform: uppercase; 
            line-height: 1; 
            margin: 5px 0;
            text-align: center;
        }

        /* --- SUPPORTO ORIENTAMENTO VERTICALE --- */
        body.v { flex-direction: column; }
        
        body.v #header { 
            flex: 0 0 22vh; 
            padding: 10px;
        }

        body.v #txt-nome { 
            font-size: 2.8rem; 
            text-align: center;
            flex-wrap: wrap;
            line-height: 1.1;
        }

        body.v #container-main { flex: 0 0 48vh; }
        body.v #footer-promo { flex: 0 0 30vh; }

        body.v .card h3 { font-size: 1.5rem; } 
        body.v .card p { font-size: 1.1rem; }

        .croce { color: #00ff88; font-size: 1.2em; animation: pulse-farmacia 2s infinite ease-in-out; }
        @keyframes pulse-farmacia { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        #stato-testo { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; }
        #orario-dettaglio { font-size: 1.1rem; color: #cbd5e1; font-weight: 600; }

        /* Stati di colore Header */
        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; border-bottom-color: #ff4444 !important; }
        .errore-rete { background: #333333; border-bottom-color: #777777 !important; } /* Colore neutro per offline */
        
        .testo-aperto { color: #00ff88 !important; }
        .testo-chiuso { color: #ffffff !important; }
        .testo-errore { color: #ffcc00 !important; }
        
        .chiuso .croce { color: white; }
        .errore-rete .croce { color: #777777; animation: none; }

        /* --- CARD TURNI --- */
        #titolo-turni { text-align: center; color: #00ff88; font-size: 1.3rem; margin-bottom: 15px; text-transform: uppercase; }
        .card { background: #172a45; margin-bottom: 15px; padding: 15px; border-radius: 15px; border: 2px solid #233554; display: flex; align-items: center;
