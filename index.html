<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #0a192f; color: white; transition: background 0.5s; }
        #header { padding: 30px; text-align: center; border-bottom: 2px solid #00ff88; }
        #header-nome { font-size: 3em; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        #header-note { font-size: 1.2em; color: #00ff88; margin-top: 10px; }
        #container-main { padding: 20px; max-width: 1200px; margin: auto; }
        .titolo-sezione { border-left: 5px solid #00ff88; padding-left: 15px; margin: 30px 0 20px 0; font-size: 1.5em; color: #cbd5e1; }
        #body-turni { display: flex; flex-direction: column; gap: 15px; }
        .card { background: #172a45; padding: 20px; border-radius: 12px; border: 1px solid #233554; display: flex; justify-content: space-between; align-items: center; }
        .card-info h3 { margin: 0; color: #00ff88; font-size: 1.4em; }
        .card-info p { margin: 5px 0; color: #8892b0; }
        .btn-mappa { background: #00ff88; color: #0a192f; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="header">
        <h1 id="header-nome">CARICAMENTO...</h1>
        <div id="header-note">In attesa dei dati...</div>
    </div>

    <div id="container-main">
        <div class="titolo-sezione">FARMACIE DI TURNO / H24</div>
        <div id="body-turni">
            </div>
    </div>

    <script>
        // Mappatura colonne basata sul tuo ultimo screenshot
        const COL = {
            ID: 0, NOME: 1, INDIRIZZO: 2, CAP: 3, LINK: 4, 
            STAGIONE: 5, INIZIO_STAG: 6, FINE_STAG: 7,
            LUN_VEN: 8, SABATO: 9, DOMENICA: 10, 
            FERIE: 11, NOTE: 12, SERVIZIO: 13 // Colonna N
        };

        async function aggiornaMonitor() {
            const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            
            const urlParams = new URLSearchParams(window.location.search);
            const mioID = urlParams.get('id'); // Legge ?id=RM001 dall'URL

            try {
                const response = await fetch(csvUrl + "&cb=" + Date.now());
                const csvText = await response.text();
                const righe = csvText.split('\n').map(r => r.split(','));

                const container = document.getElementById('body-turni');
                container.innerHTML = ''; // Svuota per aggiornare

                righe.forEach((riga, index) => {
                    // SALTA LE INTESTAZIONI (Saltiamo le prime 2 righe del foglio)
                    if (index < 2) return;

                    // Funzione interna per pulire i dati dalle virgolette del CSV
                    const pulisci = (val) => val ? val.replace(/["']/g, "").trim() : "";

                    const idFarma = pulisci(riga[COL.ID]);
                    const nomeFarma = pulisci(riga[COL.NOME]);
                    const tipoServizio = pulisci(riga[COL.SERVIZIO]);

                    // Se la riga è vuota o è l'intestazione ripetuta, saltala
                    if (!nomeFarma || nomeFarma === "NOME_FARMA") return;

                    // 1. SE È LA MIA FARMACIA (Header)
                    if (tipoServizio === "O" && idFarma === mioID) {
                        document.body.style.backgroundColor = "#064e3b"; // Verde scuro professionale
                        document.getElementById('header-nome').innerText = nomeFarma;
                        document.getElementById('header-note').innerText = pulisci(riga[COL.NOTE]) || "Servizio Farmaceutico";
                    } 
                    
                    // 2. SE È UN TURNO O UN'ALTRA FARMACIA (Body)
                    // Mostriamo tutto ciò che ha "T" o ciò che è "O" ma non è il proprietario
                    else if (tipoServizio === "T" || (tipoServizio === "O" && idFarma !== mioID)) {
                        const cardHtml = `
                            <div class="card">
                                <div class="card-info">
                                    <h3>${nomeFarma}</h3>
                                    <p>${pulisci(riga[COL.INDIRIZZO])}</p>
                                    <small style="color:#00ff88">${pulisci(riga[COL.LUN_VEN])}</small>
                                </div>
                                <a class="btn-mappa" href="${pulisci(riga[COL.LINK])}" target="_blank">MAPPA</a>
                            </div>
                        `;
                        container.innerHTML += cardHtml;
                    }
                });
