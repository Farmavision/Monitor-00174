<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision Finale</title>
    <style>
        /* 1. STRUTTURA BLOCCATA */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a192f; 
            color: white; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            font-family: sans-serif;
        }

        /* 2. ALTEZZE FISSE (vh) */
        #header { 
            height: 25vh; /* Header fissato */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-bottom: 8px solid #00ff88;
            position: relative;
            transition: background 0.5s;
        }
        #container-main { 
            height: 55vh; /* Centro fissato */
            padding: 20px;
            overflow-y: auto;
        }
        #footer-promo { 
            height: 20vh; /* Footer fissato */
            background: white; 
            color: #b91c1c; 
            display: flex; justify-content: center; align-items: center;
            border-top: 5px solid #00ff88;
        }

        /* 3. DIMENSIONI TESTO CORRETTE */
        #clock { position: absolute; top: 10px; right: 20px; font-size: 2rem; color: #00ff88; font-weight: bold; }
        #nome-farma { font-size: 3rem; font-weight: 900; text-transform: uppercase; }
        #stato-orario { font-size: 1.8rem; margin-top: 10px; font-weight: bold; }
        #promo-text { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; text-align: center; }

        /* 4. COLORI STATO */
        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; border-bottom-color: white !important; }
        
        .card { background: #172a45; margin-bottom: 20px; padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #233554; }
        .card h3 { color: #00ff88; font-size: 2rem; margin-bottom: 5px; }
        .card p { font-size: 1.4rem; color: #cbd5e1; }
    </style>
</head>
<body>

    <div id="header" class="aperto">
        <div id="clock">--:--:--</div>
        <h1 id="nome-farma">SINCRONIZZAZIONE</h1>
        <div id="stato-orario">VERIFICA DATI...</div>
    </div>

    <div id="container-main">
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo">
        <div id="promo-text">OFFERTE IN CORSO</div>
    </div>

    <script>
        // --- QUESTO È IL JAVASCRIPT CORRETTO ---
        function updateClock() {
            const ora = new Date();
            document.getElementById('clock').innerText = ora.toLocaleTimeString('it-IT');
        }
        setInterval(updateClock, 1000);
        updateClock();

        function checkOrario(cella) {
            if (!cella) return false;
            const s = cella.toUpperCase();
            if (s.includes("H24") || s.includes("APERTO")) return true;
            try {
                const ora = new Date();
                const adesso = ora.getHours() * 60 + ora.getMinutes();
                const fasce = s.split(',');
                for (let f of fasce) {
                    const parti = f.trim().split('-');
                    if (parti.length === 2) {
                        const start = parti[0].split(':');
                        const end = parti[1].split(':');
                        const mStart = parseInt(start[0])*60 + (parseInt(start[1])||0);
                        const mEnd = parseInt(end[0])*60 + (parseInt(end[1])||0);
                        if (adesso >= mStart && adesso <= mEnd) return true;
                    }
                }
            } catch(e) { return false; }
            return false;
        }

        async function carica() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            try {
                const res = await fetch(url + "&t=" + Date.now());
                const txt = await res.text();
                const righe = txt.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                
                let turniHtml = "";
                const giorno = new Date().getDay(); // 1=Lun, 0=Dom

                for (let i = 1; i < righe.length; i++) {
                    const r = righe[i];
                    if (!r[1]) continue;

                    if (r[0] === "RM001" && r[17] === "O") {
                        document.getElementById('nome-farma').innerText = r[1];
                        const orarioOggi = (giorno === 0) ? r[14] : (giorno === 6 ? r[13] : r[12]);
                        const aperta = checkOrario(orarioOggi);
                        
                        const h = document.getElementById('header');
                        if (aperta) {
                            h.classList.remove('chiuso'); h.classList.add('aperto');
                            document.getElementById('stato-orario').innerText = "APERTO: " + orarioOggi;
                        } else {
                            h.classList.remove('aperto'); h.classList.add('chiuso');
                            document.getElementById('stato-orario').innerText = "ATTUALMENTE CHIUSA";
                        }
                    } else if (r[17] === "T") {
                        turniHtml += `<div class="card"><h3>${r[1]}</h3><p>${r[2]}</p></div>`;
                    }
                }
                document.getElementById('body-turni').innerHTML = turniHtml;
            } catch(e) { console.error(e); }
        }

        const promo = ["PRESSIONE GRATUITA", "SCONTO 20% SOLARI", "ECG IMMEDIATO"];
        let pIdx = 0;
        setInterval(() => {
            document.getElementById('promo-text').innerText = promo[pIdx];
            pIdx = (pIdx + 1) % promo.length;
        }, 5000);

        carica();
        setInterval(carica, 45000);
    </script>
</body>
</html>
