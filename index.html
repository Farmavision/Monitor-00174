<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor 17" - Header Check</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #0a192f; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER - 25% */
        #header { height: 25vh; padding: 2vh 4vw; text-align: center; border-bottom: 0.8vh solid #00ff88; display: flex; flex-direction: column; justify-content: center; position: relative; box-sizing: border-box; }
        #clock { position: absolute; top: 2vh; right: 3vw; font-size: 3.5vw; color: #00ff88; font-weight: bold; }
        #header-nome { font-size: 8.5vw; font-weight: 900; text-transform: uppercase; margin: 0; line-height: 1.1; }
        #header-orario { font-size: 4vw; font-weight: 700; text-transform: uppercase; margin-top: 1vh; opacity: 0.9; }

        .header-aperto { background: #064e3b; }
        .header-chiuso { background: #b91c1c; }

        /* BODY - 50% */
        #container-main { height: 50vh; padding: 3vh 5vw; overflow-y: auto; background: #0d1e36; box-sizing: border-box; }
        .card { background: #172a45; padding: 3vh; border-radius: 2.5vw; margin-bottom: 3vh; text-align: center; border: 0.3vw solid #233554; }
        .card h3 { color: #00ff88; font-size: 5.5vw; margin: 0; text-transform: uppercase; }
        .card p { font-size: 3.5vw; margin: 1vh 0; color: #cbd5e1; }
        .qr img { width: 30vw; height: 30vw; background: white; padding: 1vw; border-radius: 1.5vw; margin-top: 1vh; }

        /* FOOTER - 25% */
        #footer-adv { height: 25vh; background: white; color: #b91c1c; display: flex; align-items: center; justify-content: center; border-top: 0.8vh solid #00ff88; position: relative; padding: 0 4vw; box-sizing: border-box; }
        #adv-content { font-size: 7.5vw; font-weight: 900; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="header" class="header-aperto">
        <div id="clock">00:00</div>
        <h1 id="header-nome">CARICAMENTO...</h1>
        <div id="header-orario">VERIFICA ORARI</div>
    </div>

    <div id="container-main">
        <div id="body-turni"></div>
    </div>

    <div id="footer-adv">
        <div id="adv-content">PROMOZIONI...</div>
    </div>

    <script>
        // --- LOGICA FERIE ---
        function isFerie(rangeStr) {
            if (!rangeStr || rangeStr.length < 5) return false;
            try {
                const oggi = new Date(); oggi.setHours(0,0,0,0);
                const [i, f] = rangeStr.split('-');
                const [di, mi] = i.split('/'); const [df, mf] = f.split('/');
                const inizio = new Date(oggi.getFullYear(), mi-1, di);
                const fine = new Date(oggi.getFullYear(), mf-1, df);
                return oggi >= inizio && oggi <= fine;
            } catch(e) { return false; }
        }

        async function aggiorna() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            const urlParams = new URLSearchParams(window.location.search);
            const mioID = (urlParams.get('id') || "RM001").toUpperCase();

            try {
                const res = await fetch(url + "?t=" + Date.now());
                const txt = await res.text();
                const righe = txt.split(/\r?\n/).map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                
                const MAP = { ID:0, NOME:1, ADDR:2, LINK:4, L_V:9, SAB:10, DOM:11, FER:15, SERV:17 };
                const container = document.getElementById('body-turni');
                container.innerHTML = '';
                const giorno = new Date().getDay();

                righe.forEach((r, idx) => {
                    if (idx === 0 || !r[MAP.NOME]) return;

                    if (r[MAP.ID].toUpperCase() === mioID && r[MAP.SERV] === "O") {
                        document.getElementById('header-nome').innerText = r[MAP.NOME];
                        let orario = (giorno === 0) ? r[MAP.DOM] : (giorno === 6 ? r[MAP.SAB] : r[MAP.L_V]);
                        
                        if (isFerie(r[MAP.FER])) {
                            document.getElementById('header').className = "header-chiuso";
                            document.getElementById('header-orario').innerText = "CHIUSO PER FERIE";
                        } else if (orario.toUpperCase().includes("CHIUSO")) {
                            document.getElementById('header').className = "header-chiuso";
                            document.getElementById('header-orario').innerText = "OGGI: CHIUSO";
                        } else {
                            document.getElementById('header').className = "header-aperto";
                            document.getElementById('header-orario').innerText = "OGGI: " + orario;
                        }
                    } else if (r[MAP.SERV] === "T") {
                        const qr = r[MAP.LINK] ? `<div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(r[MAP.LINK])}"></div>` : "";
                        container.innerHTML += `<div class="card"><h3>${r[MAP.NOME]}</h3><p>${r[MAP.ADDR]}</p>${qr}</div>`;
                    }
                });
            } catch(e) { console.log(e); }
        }

        function clock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'}); }
        setInterval(clock, 1000); clock();
        aggiorna(); setInterval(aggiorna, 60000);

        const promo = ["SCONTO 30% SOLARI", "PROMO INTEGRATORI 1+1", "ECG IN SEDE", "PRESSIONE GRATIS"];
        let pIdx = 0;
        setInterval(() => { 
            document.getElementById('adv-content').innerText = promo[pIdx]; 
            pIdx = (pIdx + 1) % promo.length; 
        }, 7000);
    </script>
</body>
</html>
