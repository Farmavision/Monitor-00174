<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #0a192f; color: white; transition: background 0.5s; overflow-x: hidden; }
        
        /* Header & Orologio */
        #header { padding: 40px 20px; text-align: center; border-bottom: 3px solid #00ff88; position: relative; background: #172a45; }
        #clock { position: absolute; top: 15px; right: 20px; font-family: monospace; font-size: 1.5em; color: #00ff88; }
        #header-nome { font-size: 3.2em; margin: 0; text-transform: uppercase; font-weight: 800; letter-spacing: 2px; }
        #header-note { font-size: 1.3em; color: #00ff88; margin-top: 15px; }
        
        /* Layout Card */
        #container-main { padding: 30px; max-width: 1100px; margin: auto; }
        .titolo-sezione { border-left: 6px solid #00ff88; padding-left: 20px; margin: 30px 0 25px 0; font-size: 1.8em; color: #8892b0; text-transform: uppercase; }
        #body-turni { display: flex; flex-direction: column; gap: 20px; }
        
        .card { 
            background: #172a45; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #233554; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .card-info { flex: 1; }
        .card-info h3 { margin: 0; color: #00ff88; font-size: 1.8em; }
        .card-info p { margin: 10px 0; color: #cbd5e1; font-size: 1.2em; }

        /* QR Code Style */
        .qr-container { text-align: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid #233554; margin-left: 20px; }
        .qr-container img { width: 120px; height: 120px; display: block; }
        .qr-label { font-size: 0.8em; color: #00ff88; font-weight: bold; margin-top: 5px; letter-spacing: 1px; }

        @media (max-width: 600px) {
            .card { flex-direction: column; text-align: center; }
            .qr-container { margin: 20px 0 0 0; }
        }
    </style>
</head>
<body>
    <div id="clock">00:00:00</div>
    <div id="header">
        <h1 id="header-nome">CARICAMENTO...</h1>
        <div id="header-note">Sincronizzazione database...</div>
    </div>
    <div id="container-main">
        <div class="titolo-sezione">Farmacie di Turno Aperte</div>
        <div id="body-turni"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('it-IT');
        }
        setInterval(updateClock, 1000);
        updateClock();

        function splitCSV(text) {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            return text.split(regex).map(val => val.replace(/^"|"$/g, '').trim());
        }

        async function aggiornaMonitor() {
            const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            const urlParams = new URLSearchParams(window.location.search);
            const mioID = urlParams.get('id')?.toUpperCase();

            try {
                const response = await fetch(csvUrl + "&cb=" + Date.now());
                const csvText = await response.text();
                const righe = csvText.split(/\r?\n/);
                
                let mapping = { id: 0, nome: 1, indirizzo: 2, link: 5, note: 13, servizio: 14 };
                let trovatoProprietario = false;
                const container = document.getElementById('body-turni');
                container.innerHTML = '';

                righe.forEach((rigaRaw, index) => {
                    const riga = splitCSV(rigaRaw);
                    if (riga.includes("D_CLIENTE")) {
                        mapping.id = riga.indexOf("D_CLIENTE");
                        mapping.nome = riga.indexOf("NOME_FARMACIA");
                        mapping.link = riga.indexOf("LINK");
                        mapping.servizio = riga.indexOf("Servizio");
                        return;
                    }
                    if (index < 2 || !riga[mapping.nome]) return;

                    const idFarma = riga[mapping.id]?.toUpperCase();
                    const tipoServizio = riga[mapping.servizio]?.toUpperCase();
                    const googleMapsLink = riga[mapping.link] || "";
                    
                    // Genera QR Code (usando l'API gratuita qrserver)
                    const qrUrl = googleMapsLink ? `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(googleMapsLink)}&bgcolor=172a45&color=00ff88` : "";

                    if (tipoServizio === "O" && idFarma === mioID) {
                        trovatoProprietario = true;
                        document.body.style.backgroundColor = "#064e3b";
                        document.getElementById('header-nome').innerText = riga[mapping.nome];
                        document.getElementById('header-note').innerText = riga[mapping.note] || "SERVIZIO CONTINUATO";
                    } 
                    else if (tipoServizio === "T") {
                        container.innerHTML += `
                            <div class="card">
                                <div class="card-info">
                                    <h3>${riga[mapping.nome]}</h3>
                                    <p>${riga[mapping.indirizzo] || ''}</p>
                                </div>
                                ${googleMapsLink ? `
                                <div class="qr-container">
                                    <img src="${qrUrl}" alt="QR Mappa">
                                    <div class="qr-label">MAPPA</div>
                                </div>` : ''}
                            </div>`;
                    }
                });

                if (!trovatoProprietario && mioID) {
                    document.getElementById('header-nome').innerText = "ID NON TROVATO";
                    document.getElementById('header-note').innerText = `L'ID ${mioID} non è di tipo 'O'.`;
                }

            } catch (err) {
                document.getElementById('header-nome').innerText = "ERRORE CONNESSIONE";
            }
        }

        aggiornaMonitor();
        setInterval(aggiornaMonitor, 60000);
    </script>
</body>
</html>
