<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision 17" - Fix Schermo Blu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a192f; 
            color: white; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- LAYOUT ALTEZZE --- */
        #header { 
            height: 20vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-bottom: 8px solid #00ff88;
            position: relative;
            flex-shrink: 0;
        }
        #container-main { 
            height: 55vh; 
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }
        #footer-promo { 
            height: 25vh; 
            background: white; 
            color: #b91c1c; 
            display: flex; justify-content: center; align-items: center;
            border-top: 8px solid #00ff88;
            flex-shrink: 0;
        }

        /* HEADER E CROCI */
        #clock { position: absolute; top: 10px; right: 20px; font-size: 1.8rem; color: #00ff88; font-family: monospace; font-weight: bold; }
        #nome-farma { 
            font-size: 2.8rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        .croce { color: #00ff88; font-size: 1.1em; animation: pulse 2s infinite; }
        .chiuso .croce, .chiuso #clock { color: white !important; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* STATI */
        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; border-bottom-color: white !important; }
        #stato-orario { font-size: 1.6rem; margin-top: 5px; font-weight: bold; text-transform: uppercase; }

        /* CARD: TESTO SX, QR DX */
        .titolo-sezione { border-left: 8px solid #00ff88; padding-left: 15px; margin-bottom: 20px; font-size: 1.2rem; color: #8892b0; font-weight: bold; text-transform: uppercase; }
        
        .card { 
            background: #172a45; 
            margin-bottom: 25px; 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid #233554; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 20px; 
        }

        .card-info { text-align: left; flex-grow: 1; }
        .card h3 { color: #00ff88; font-size: 2.2rem; text-transform: uppercase; margin: 0; line-height: 1.1; }
        .card p { font-size: 1.6rem; color: #cbd5e1; font-weight: 600; margin-top: 5px; }
        
        .qr-wrapper { 
            background: white; 
            padding: 8px; 
            border-radius: 12px; 
            flex-shrink: 0; 
        }
        .qr-wrapper img { width: 120px; height: 120px; display: block; }

        #promo-text { font-size: 4.2rem; font-weight: 900; text-transform: uppercase; text-align: center; line-height: 1; padding: 0 20px; }
    </style>
</head>
<body>

    <div id="header" class="aperto">
        <div id="clock">--:--:--</div>
        <h1 id="nome-farma">
            <span class="croce">&#10010;</span>
            <span id="txt-nome">INIZIALIZZAZIONE...</span>
            <span class="croce">&#10010;</span>
        </h1>
        <div id="stato-orario">CARICAMENTO DATI</div>
    </div>

    <div id="container-main">
        <div class="titolo-sezione">FARMACIE DI TURNO H24</div>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo">
        <div id="promo-text">...</div>
    </div>

    <script>
        // Funzione per l'orologio (senza errori)
        function updateClock() { 
            const el = document.getElementById('clock');
            if(el) el.innerText = new Date().toLocaleTimeString('it-IT'); 
        }

        // Funzione per il controllo orario
        function isAperta(cella) {
            if (!cella) return false;
            const s = cella.toUpperCase();
            if (s.includes("H24") || s.includes("APERTO")) return true;
            try {
                const adesso = new Date();
                const min = adesso.getHours() * 60 + adesso.getMinutes();
                const fasce = s.split(',');
                for (let f of fasce) {
                    const parti = f.trim().split('-');
                    if (parti.length === 2) {
                        const sP = parti[0].split(':'); 
                        const eP = parti[1].split(':');
                        const mS = parseInt(sP[0])*60 + (parseInt(sP[1])||0);
                        const mE = parseInt(eP[0])*60 + (parseInt(eP[1])||0);
                        if (min >= mS && min <= mE) return true;
                    }
                }
            } catch(e) { return false; }
            return false;
        }

        // Caricamento principale
        async function carica() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            try {
                const res = await fetch(url + "&t=" + Date.now());
                if (!res.ok) throw new Error("Errore di rete");
                const txt = await res.text();
                
                const righe = txt.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                let html = "";
                const giorno = new Date().getDay(); 

                for (let i = 1; i < righe.length; i++) {
                    const r = righe[i];
                    if (!r[1]) continue;

                    // Gestione Farmacia Principale
                    if (r[0] === "RM001" && r[17] === "O") {
                        const txtNome = document.getElementById('txt-nome');
                        if (txtNome) txtNome.innerText = r[1];
                        
                        const orario = (giorno === 0) ? r[14] : (giorno === 6 ? r[13] : r[12]);
                        const aperta = isAperta(orario);
                        const h = document.getElementById('header');
                        const st = document.getElementById('stato-orario');
                        
                        if (h && st) {
                            h.className = aperta ? 'aperto' : 'chiuso';
                            st.innerText = aperta ? "APERTO: " + orario : "ATTUALMENTE CHIUSA";
                        }
                    } 
                    // Gestione Turni con QR a destra
                    else if (r[17] === "T") {
                        const qr = r[4] ? `<div class="qr-wrapper"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(r[4])}"></div>` : "";
                        html += `
                            <div class="card">
                                <div class="card-info">
                                    <h3>${r[1]}</h3>
                                    <p>${r[2]}</p>
                                </div>
                                ${qr}
                            </div>`;
                    }
                }
                const bodyTurni = document.getElementById('body-turni');
                if (bodyTurni) bodyTurni.innerHTML = html;
            } catch(e) { 
                console.error("Errore caricamento:", e);
                const st = document.getElementById('stato-orario');
                if(st) st.innerText = "ERRORE CONNESSIONE DATI";
            }
        }

        // Avvio sicuro
        window.addEventListener('DOMContentLoaded', () => {
            setInterval(updateClock, 1000); 
            updateClock();
            
            carica();
            setInterval(carica, 60000);

            const promo = ["PRESSIONE GRATUITA", "SCONTO 20% SOLARI", "ECG IMMEDIATO"];
            let pIdx = 0;
            setInterval(() => {
                const pt = document.getElementById('promo-text');
                if(pt) {
                    pt.innerText = promo[pIdx];
                    pIdx = (pIdx + 1) % promo.length;
                }
            }, 5000);
        });
    </script>
</body>
</html>
