<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Farmavision - Monitor Vetrina</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial; margin: 0; overflow: hidden; }
        #header { background: #008f39; padding: 15px; text-align: center; font-size: 2em; font-weight: bold; }
        #container { padding: 20px; height: 75vh; }
        .farmacia-card { border-bottom: 1px solid #333; padding: 15px 0; }
        .nome { color: #00ff00; font-size: 2.5em; font-weight: bold; }
        .indirizzo { font-size: 1.8em; }
        
        /* AREA ADVERTISING */
        #adv-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #ffcc00; /* Giallo cattura attenzione */
            color: #000;
            padding: 15px 0;
            font-size: 2em;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
        }
        .marquee {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
    </style>
</head>
<body>

<div id="header">FARMACIE DI TURNO</div>
<div id="container">Caricamento in corso...</div>

<div id="adv-bar">
    <div class="marquee" id="adv-text">OFFERTA DEL MESE: Sconto 20% su tutti i Solari! — Farmavision: La tua vetrina intelligente.</div>
</div>

<script>
    // Inserisci qui il tuo link CSV di Google Sheets
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv';

    async function updateMonitor() {
        try {
            const response = await fetch(csvUrl + '&cb=' + Date.now());
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            let html = '';
            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length >= 2) {
                    html += `<div class="farmacia-card">
                        <div class="nome">${cols[0].replace(/"/g, '')}</div>
                        <div class="indirizzo">${cols[1].replace(/"/g, '')}</div>
                    </div>`;
                }
            });
            document.getElementById('container').innerHTML = html;
        } catch (e) { console.error(e); }
    }

    setInterval(updateMonitor, 900000);
    updateMonitor();
</script>
</body>
</html>
