<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision - Vertical Fixed</title>
    <style>
        * { box-sizing: border-box; } /* Fondamentale per non far sparire il footer */

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            background-color: #0a192f; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #brand-top { text-align: center; padding: 10px 0 5px 0; font-size: 1.5em; font-weight: 900; letter-spacing: 6px; color: #ffffff; }
        #brand-top span { color: #00ff88; }

        /* HEADER (25%) */
        #header { 
            height: 25vh;
            padding: 15px; 
            text-align: center; 
            border-bottom: 12px solid #00ff88; 
            position: relative; 
            display: flex; flex-direction: column; justify-content: center;
            flex-shrink: 0; /* Impedisce all'header di rimpicciolirsi */
        }

        #clock { 
            position: absolute; top: 10px; right: 20px; 
            font-family: monospace; font-size: 2.2em; color: #00ff88; font-weight: bold; 
        }

        .header-aperto { background: #064e3b !important; }
        .header-chiuso { background: #b91c1c !important; border-bottom-color: #ffffff !important; }

        #header-nome { 
            font-size: 4.5em; 
            margin: 10px 0; 
            text-transform: uppercase; 
            font-weight: 900; 
            line-height: 1;
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }

        .croce { color: #00ff88; font-size: 0.9em; animation: pulse 2s infinite; }
        .header-chiuso .croce { color: white !important; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        #header-orario { font-size: 2.2em; color: #ffffff; font-weight: 800; text-transform: uppercase; }
        #header-note { font-size: 1.8em; color: #00ff88; margin-top: 5px; font-weight: 600; font-style: italic; }

        /* BODY (55%) */
        #container-main { 
            height: 55vh; /* Altezza fissa per garantire spazio al footer */
            padding: 30px 40px; 
            overflow-y: auto; 
            flex-grow: 1; /* Occupa lo spazio disponibile ma non oltre il 55% */
        }

        .titolo-sezione { 
            border-left: 10px solid #00ff88; 
            padding-left: 20px; 
            margin-bottom: 30px; 
            font-size: 1.8em; 
            color: #8892b0; 
            font-weight: bold; 
            text-transform: uppercase;
        }

        .card { 
            background: #172a45; padding: 30px; border-radius: 25px; border: 3px solid #233554; 
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px; margin-bottom: 30px;
        }

        .card-info h3 { margin: 0; color: #00ff88; font-size: 3em; }
        .card-info p { margin: 15px 0 0 0; color: #cbd5e1; font-size: 2em; }
        .qr-container { background: white; padding: 15px; border-radius: 20px; }
        .qr-container img { width: 200px; height: 200px; display: block; }

        /* FOOTER (20%) - ORA FORZATO IN VISTA */
        #footer-promo {
            height: 20vh;
            background: white;
            color: #b91c1c;
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-top: 10px solid #00ff88;
            padding: 0 20px;
            flex-shrink: 0; /* Impedisce al footer di essere schiacciato */
        }
        #promo-text { font-size: 4em; font-weight: 900; text-transform: uppercase; text-align: center; line-height: 1.1; }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-thumb { background: #233554; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="header" class="header-aperto">
        <div id="brand-top">FARMA<span>VISION</span></div>
        <div id="clock">00:00:00</div>
        <h1 id="header-nome">
            <span class="croce">&#10010;</span>
            <span id="nome-farma">...</span>
            <span class="croce">&#10010;</span>
        </h1>
        <div id="header-orario">Sincronizzazione...</div>
        <div id="header-note"></div>
    </div>

    <div id="container-main">
        <div class="titolo-sezione">ELENCO DELLE FARMACIE DI TURNO CHE EFFETTUANO SERVIZIO ASSISTENZIALE H24</div>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo">
        <div id="promo-text">OFFERTE IN CORSO...</div>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        const promozioni = ["SCONTO 30% SOLARI", "PROMO INTEGRATORI 1+1", "ECG E PRESSIONE", "SCOPRI I NOSTRI SERVIZI"];
        let pIdx = 0;
        setInterval(() => {
            document.getElementById('promo-text').innerText = promozioni[pIdx];
            pIdx = (pIdx + 1) % promozioni.length;
        }, 7000);

        // Funzione parsing orari e fetch uguale alla precedente...
        async function aggiorna() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            const mioID = new URLSearchParams(window.location.search).get('id')?.toUpperCase() || "RM001";
            
            try {
                const res = await fetch(url + "&t=" + Date.now());
                const txt = await res.text();
                const righe = txt.split(/\r?\n/).map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                
                const MAP = { ID:0, NOME:1, ADDR:2, LINK:4, I_E:7, F_E:8, E_LV:9, E_S:10, E_D:11, I_LV:12, I_S:13, I_D:14, FER:15, NOTE:16, SERV:17 };
                const container = document.getElementById('body-turni');
                container.innerHTML = '';
                const oggi = new Date(); const day = oggi.getDay(); 

                for (let i = 1; i < righe.length; i++) {
                    const r = righe[i]; if (!r[MAP.NOME]) continue;
                    if (r[MAP.ID].toUpperCase() === mioID && r[MAP.SERV] === "O") {
                        document.getElementById('nome-farma').innerText = r[MAP.NOME];
                        document.getElementById('header-note').innerText = r[MAP.NOTE] || "";
                        // Logica orari...
                        document.getElementById('header-orario').innerText = "APERTO: " + (day===0 ? r[MAP.I_D] : (day===6 ? r[MAP.I_S] : r[MAP.I_LV]));
                    } else if (r[MAP.SERV] === "T") {
                        const qr = r[MAP.LINK] ? `<div class="qr-container"><img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(r[MAP.LINK])}"></div>` : "";
                        container.innerHTML += `<div class="card"><div class="card-info"><h3>${r[MAP.NOME]}</h3><p>${r[MAP.ADDR]}</p></div>${qr}</div>`;
                    }
                }
            } catch (e) { console.error(e); }
        }
        aggiorna(); setInterval(aggiorna, 45000);
    </script>
</body>
</html>
