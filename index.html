<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision - Vertical Stable</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            background-color: #0a192f; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #brand-top { text-align: center; padding: 10px 0; font-size: 1.5em; font-weight: 900; letter-spacing: 6px; flex-shrink: 0; }
        #brand-top span { color: #00ff88; }

        #header { 
            height: 25vh;
            padding: 20px; 
            text-align: center; 
            border-bottom: 12px solid #00ff88; 
            position: relative; 
            display: flex; flex-direction: column; justify-content: center;
            flex-shrink: 0;
            transition: background 0.5s;
        }

        #clock { position: absolute; top: 10px; right: 20px; font-family: monospace; font-size: 2em; color: #00ff88; font-weight: bold; }

        .header-aperto { background: #064e3b !important; border-bottom-color: #00ff88 !important; }
        .header-chiuso { background: #b91c1c !important; border-bottom-color: #ffffff !important; }

        #header-nome { font-size: 4.5em; margin: 10px 0; text-transform: uppercase; font-weight: 900; line-height: 1; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .croce { color: #00ff88; font-size: 0.9em; animation: pulse 2s infinite; }
        .header-chiuso .croce, .header-chiuso #clock { color: white !important; }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        #header-orario { font-size: 2.2em; font-weight: 800; text-transform: uppercase; }
        #header-note { font-size: 1.8em; color: #00ff88; margin-top: 5px; font-weight: 600; font-style: italic; }
        .header-chiuso #header-note { color: white !important; }

        #container-main { 
            flex-grow: 1;
            padding: 20px 40px; 
            overflow-y: auto; 
            background: #0d1e36;
        }

        .titolo-sezione { 
            border-left: 10px solid #00ff88; 
            padding-left: 20px; 
            margin-bottom: 30px; 
            font-size: 1.8em; 
            color: #8892b0; 
            font-weight: bold; 
            text-transform: uppercase;
        }

        .card { background: #172a45; padding: 30px; border-radius: 25px; border: 3px solid #233554; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px; margin-bottom: 30px; }
        .card h3 { margin: 0; color: #00ff88; font-size: 3em; text-transform: uppercase; }
        .card p { margin: 10px 0; color: #cbd5e1; font-size: 2em; }
        .qr-container { background: white; padding: 15px; border-radius: 20px; }
        .qr-container img { width: 200px; height: 200px; display: block; }

        #footer-promo {
            height: 18vh;
            background: white;
            color: #b91c1c;
            display: flex; align-items: center; justify-content: center;
            border-top: 10px solid #00ff88;
            flex-shrink: 0;
        }
        #promo-text { font-size: 4em; font-weight: 900; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>
    <div id="brand-top">FARMA<span>VISION</span></div>
    
    <div id="header" class="header-aperto">
        <div id="clock">00:00:00</div>
        <h1 id="header-nome"><span class="croce">&#10010;</span><span id="nome-farma">ATTESA...</span><span class="croce">&#10010;</span></h1>
        <div id="header-orario">CARICAMENTO DATI</div>
        <div id="header-note"></div>
    </div>

    <div id="container-main">
        <div class="titolo-sezione">ELENCO DELLE FARMACIE DI TURNO CHE EFFETTUANO SERVIZIO ASSISTENZIALE H24</div>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo"><div id="promo-text">PROMOZIONI</div></div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        const promozioni = ["SCONTO 30% SOLARI", "PROMO INTEGRATORI 1+1", "ECG E PRESSIONE"];
        let pIdx = 0;
        setInterval(() => {
            const el = document.getElementById('promo-text');
            if(el) el.innerText = promozioni[pIdx];
            pIdx = (pIdx + 1) % promozioni.length;
        }, 6000);

        async function aggiorna() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            const mioID = new URLSearchParams(window.location.search).get('id')?.toUpperCase() || "RM001";
            
            try {
                const res = await fetch(url + "&t=" + Date.now());
                const txt = await res.text();
                const righe = txt.split(/\r?\n/).map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                
                const MAP = { ID:0, NOME:1, ADDR:2, LINK:4, I_E:7, F_E:8, E_LV:9, E_S:10, E_D:11, I_LV:12, I_S:13, I_D:14, FER:15, NOTE:16, SERV:17 };
                const container = document.getElementById('body-turni');
                const oggi = new Date(); const day = oggi.getDay(); 
                let htmlStr = "";

                for (let i = 1; i < righe.length; i++) {
                    const r = righe[i];
                    if (!r[MAP.NOME]) continue;

                    if (r[MAP.ID].toUpperCase() === mioID && r[MAP.SERV] === "O") {
                        document.getElementById('nome-farma').innerText = r[MAP.NOME];
                        document.getElementById('header-note').innerText = r[MAP.NOTE] || "";
                        // Semplificato per test: prendi orario invernale LV
                        let orStr = r[MAP.I_LV] || "APERTO";
                        document.getElementById('header-orario').innerText = "APERTO: " + orStr;
                        document.getElementById('header').className = "header-aperto";
                    } else if (r[MAP.SERV] === "T") {
                        const qr = r[MAP.LINK] ? `<div class="qr-container"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(r[MAP.LINK])}"></div>` : "";
                        htmlStr += `<div class="card"><h3>${r[MAP.NOME]}</h3><p>${r[MAP.ADDR]}</p>${qr}</div>`;
                    }
                }
                container.innerHTML = htmlStr;
            } catch (e) { console.error("Errore sync:", e); }
        }

        aggiorna();
        setInterval(aggiorna, 40000);
    </script>
</body>
</html>
