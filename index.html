<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision 00174</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #0a192f; color: white; overflow-x: hidden; }
        
        /* BRAND FARMAVISION - Sommità dell'Header */
        #brand-top { text-align: center; padding: 15px 0 5px 0; font-size: 1.4em; font-weight: 900; letter-spacing: 5px; color: #ffffff; }
        #brand-top span { color: #00ff88; }

        /* HEADER DINAMICO */
        #header { padding: 10px 20px 40px 20px; text-align: center; border-bottom: 6px solid #00ff88; position: relative; transition: all 0.5s; }
        #clock { position: absolute; top: 15px; right: 25px; font-family: monospace; font-size: 1.6em; color: #00ff88; font-weight: bold; }
        
        /* COLORI STATO */
        .header-aperto { background: #064e3b !important; border-bottom-color: #00ff88 !important; }
        .header-chiuso { background: #ff0000 !important; border-bottom-color: #ffffff !important; }

        #header-nome { font-size: 3.8em; margin: 15px 0; text-transform: uppercase; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .croce { color: #00ff88; font-size: 0.8em; animation: pulse 2s infinite; }
        .header-chiuso .croce { color: white; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        #header-orario { font-size: 2.2em; color: #ffffff; margin-top: 5px; font-weight: 800; text-transform: uppercase; }
        #header-note { font-size: 1.4em; color: #00ff88; margin-top: 5px; font-weight: 600; font-style: italic; }
        .header-chiuso #header-note { color: white; }
        
        /* SEZIONE TURNI */
        #container-main { padding: 30px; max-width: 1100px; margin: auto; }
        .titolo-sezione { border-left: 6px solid #00ff88; padding-left: 20px; margin-bottom: 25px; font-size: 1.3em; color: #8892b0; font-weight: bold; text-transform: uppercase; }
        
        #body-turni { display: flex; flex-direction: column; gap: 20px; }
        .card { background: #172a45; padding: 25px; border-radius: 15px; border: 1px solid #233554; display: flex; justify-content: space-between; align-items: center; }
        .card-info h3 { margin: 0; color: #00ff88; font-size: 2.2em; }
        .card-info p { margin: 8px 0 0 0; color: #cbd5e1; font-size: 1.4em; }

        .qr-container { text-align: center; background: white; padding: 10px; border-radius: 12px; margin-left: 25px; }
        .qr-container img { width: 130px; height: 130px; display: block; }
        .qr-label { font-size: 0.8em; color: #0a192f; font-weight: 900; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="header" class="header-aperto">
        <div id="brand-top">FARMA<span>VISION</span></div>
        <div id="clock">00:00:00</div>
        
        <h1 id="header-nome">
            <span class="croce">&#10010;</span>
            <span id="nome-farma">CARICAMENTO...</span>
            <span class="croce">&#10010;</span>
        </h1>
        <div id="header-orario">Verifica orari...</div>
        <div id="header-note"></div>
    </div>

    <div id="container-main">
        <div class="titolo-sezione">
            ELENCO DELLE FARMACIE DI TURNO H24 NELLA GIORNATA DI OGGI
            <div style="font-size: 0.6em; font-weight: normal; margin-top: 5px;">(FONTE: ORDINE DEI FARMACISTI DI ROMA)</div>
        </div>
        <div id="body-turni"></div>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        function safeSplitCSV(text) {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            return text.split(regex).map(v => v.replace(/^"|"$/g, '').trim());
        }

        async function aggiornaMonitor() {
            const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            const urlParams = new URLSearchParams(window.location.search);
            const mioID = urlParams.get('id')?.toUpperCase() || "RM001";

            try {
                const response = await fetch(csvUrl + "&t=" + Date.now());
                const csvText = await response.text();
                const righe = csvText.split(/\r?\n/);
                const container = document.getElementById('body-turni');
                const header = document.getElementById('header');
                container.innerHTML = '';
                
                // Mappa: ID(0), Nome(1), Addr(2), Link(4), Orario(9), Ferie(12), Note(13), Serv(14)
                const MAP = { ID: 0, NOME: 1, ADDR: 2, LINK: 4, ORA: 9, FERIE: 12, NOTE: 13, SERV: 14 };

                for (let i = 1; i < righe.length; i++) {
                    const riga = safeSplitCSV(righe[i]);
                    if (!riga[MAP.NOME]) continue;

                    const idFarma = riga[MAP.ID].toUpperCase();
                    const servizio = riga[MAP.SERV].toUpperCase();

                    if (idFarma === mioID && servizio === "O") {
                        document.getElementById('nome-farma').innerText = riga[MAP.NOME];
                        document.getElementById('header-note').innerText = riga[MAP.NOTE];
                        
                        // LOGICA CORRETTA APERTURA/CHIUSURA
                        const orarioTesto = riga[MAP.ORA].toUpperCase();
                        const ferieTesto = riga[MAP.FERIE] ? riga[MAP.FERIE].trim() : "";
                        
                        // Se la colonna L (FERIE) non è vuota, siamo chiusi per ferie
                        if (ferieTesto !== "") {
                            header.className = "header-chiuso";
                            document.getElementById('header-orario').innerText = "CHIUSO PER FERIE (" + ferieTesto + ")";
                        } 
                        // Se l'orario di oggi contiene "CHIUSO"
                        else if (orarioTesto.includes("CHIUSO")) {
                            header.className = "header-chiuso";
                            document.getElementById('header-orario').innerText = "ATTUALMENTE CHIUSA (TURNO)";
                        } 
                        else {
                            header.className = "header-aperto";
                            document.getElementById('header-orario').innerText = "Orario oggi: " + riga[MAP.ORA];
                        }
                    } 
                    else if (servizio === "T") {
                        const link = riga[MAP.LINK];
                        const qr = link ? `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(link)}&bgcolor=ffffff` : "";
                        container.innerHTML += `
                            <div class="card">
                                <div class="card-info"><h3>${riga[MAP.NOME]}</h3><p>${riga[MAP.ADDR]}</p></div>
                                ${link ? `<div class="qr-container"><img src="${qr}"><div class="qr-label">MAPPA</div></div>` : ''}
                            </div>`;
                    }
                }
            } catch (e) { console.error(e); }
        }
        aggiornaMonitor();
        setInterval(aggiornaMonitor, 60000);
    </script>
</body>
</html>
