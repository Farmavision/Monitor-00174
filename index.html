<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmavision - Monitor Turni</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #001529;
            --accent-color: #00ff88;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        header {
            height: 15vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            background: rgba(255,255,255,0.05);
            border-bottom: 2px solid var(--accent-color);
        }

        .logo { font-size: 2.5rem; font-weight: 800; color: var(--accent-color); }
        .clock { font-size: 2rem; }

        main {
            height: 70vh;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .farmacia-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 1s ease-in;
        }

        .info h2 { margin: 0; font-size: 2.5rem; text-transform: uppercase; color: var(--accent-color); }
        .info p { margin: 5px 0 0; font-size: 1.8rem; opacity: 0.9; }

        .qr-code { text-align: center; }
        .qr-code img {
            width: 160px;
            height: 160px;
            border: 8px solid white;
            border-radius: 10px;
        }
        .qr-code span { display: block; color: white; font-size: 0.8rem; margin-top: 5px; font-weight: bold; }

        #status-msg { text-align: center; margin-top: 10vh; }
        .numero-emergenza { color: #ff4d4f; font-size: 4rem; margin-top: 20px; font-weight: 800; }

        footer {
            height: 15vh;
            background: var(--accent-color);
            color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">FARMAVISION</div>
        <div class="clock" id="live-clock">00:00:00</div>
    </header>

    <main id="container">
        <div id="status-msg">
            <h1>Caricamento turni...</h1>
        </div>
    </main>

    <footer>
        SERVIZIO CONTINUATO - INQUADRA IL QR PER IL NAVIGATORE
    </footer>

    <script>
    // Il link esatto che mi hai fornito con l'aggiunta del timer per saltare la cache
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv&t=' + new Date().getTime();

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('it-IT');
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function fetchTurni() {
        const container = document.getElementById('container');
        try {
            console.log("Tentativo di recupero dati...");
            const response = await fetch(SHEET_URL);
            
            if (!response.ok) throw new Error("Risposta server non OK");
            
            const text = await response.text();
            console.log("Dati grezzi ricevuti:", text);

            // Pulizia righe: rimuove spazi vuoti e l'intestazione
            const rows = text.split(/\r?\n/).filter(row => row.trim().length > 10);
            
            // Rimuoviamo la prima riga se contiene "nome" o "indirizzo"
            if (rows.length > 0 && (rows[0].toLowerCase().includes("nome") || rows[0].toLowerCase().includes("farmacia"))) {
                rows.shift();
            }

            if (rows.length === 0) {
                container.innerHTML = `
                    <div id="status-msg">
                        <h1 style="font-size: 3.5rem;">AGGIORNAMENTO TURNI IN CORSO</h1>
                        <p style="font-size: 1.8rem;">I nuovi turni saranno disponibili a breve.</p>
                        <div class="numero-emergenza">112 / 118</div>
                    </div>`;
                return;
            }

            container.innerHTML = ''; 
            rows.forEach(row => {
                // Split più semplice per evitare errori
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 2) {
                    const nome = cols[0].replace(/"/g, "").trim();
                    const indirizzo = cols[1].replace(/"/g, "").trim();
                    
                    // Link Google Maps standard
                    const mapsLink = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(indirizzo);
                    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(mapsLink);
                    
                    container.innerHTML += `
                        <div class="farmacia-card">
                            <div class="info">
                                <h2>${nome}</h2>
                                <p>${indirizzo}</p>
                            </div>
                            <div class="qr-code">
                                <img src="${qrUrl}" alt="QR">
                                <span>MAPPA</span>
                            </div>
                        </div>`;
                }
            });
        } catch (error) {
            console.error("Errore dettagliato:", error);
            container.innerHTML = `<div id="status-msg"><h1>Errore di caricamento</h1><p>Controlla che il Foglio Google sia "Pubblicato sul Web" come CSV.</p></div>`;
        }
    }

    // Forza il primo caricamento e poi ogni 5 minuti
    fetchTurni();
    setInterval(fetchTurni, 300000);
    </script>
</body>
</html>
