<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmacia Universale</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a192f; color: white; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            
            /* --- OTTIMIZZAZIONI KIOSK --- */
            cursor: none; /* Nasconde il cursore del mouse */
            user-select: none; /* Impedisce la selezione del testo */
            -webkit-user-select: none;
            touch-action: manipulation; /* Ottimizza il tocco ed evita zoom accidentali */
        }

        /* Nasconde la barra di scorrimento ma permette lo scroll interno */
        ::-webkit-scrollbar {
            display: none;
        }

        /* --- LAYOUT 18-50-32 --- */
        #header { 
            flex: 0 0 18vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-bottom: 6px solid #00ff88; position: relative;
            padding: 5px 0;
            transition: background-color 0.5s ease;
        }

        #container-main { 
            flex: 0 0 50vh; 
            padding: 20px; 
            overflow-y: auto; 
        }

        #footer-promo {
            flex: 0 0 32vh; 
            width: 100%;
            background-color: white; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- STILI HEADER --- */
        #clock { font-size: 1.2rem; color: #00ff88; font-weight: bold; position: absolute; top: 10px; right: 20px; }
        
        .label-static { 
            font-size: 1.6rem; 
            color: #ffffff; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: -10px;
            opacity: 0.8;
        }

        #txt-nome { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
            font-size: 3.8rem; 
            font-weight: 900; 
            color: #ffffff; 
            text-transform: uppercase; 
            line-height: 1; 
            margin: 5px 0;
            text-align: center;
        }

        /* --- SUPPORTO ORIENTAMENTO VERTICALE --- */
        body.v { flex-direction: column; }
        
        body.v #header { 
            flex: 0 0 22vh; 
            padding: 10px;
        }

        body.v #txt-nome { 
            font-size: 2.8rem; 
            text-align: center;
            flex-wrap: wrap;
            line-height: 1.1;
        }

        body.v #container-main { flex: 0 0 48vh; }
        body.v #footer-promo { flex: 0 0 30vh; }

        body.v .card h3 { font-size: 1.5rem; } 
        body.v .card p { font-size: 1.1rem; }

        .croce { color: #00ff88; font-size: 1.2em; animation: pulse-farmacia 2s infinite ease-in-out; }
        @keyframes pulse-farmacia { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        #stato-testo { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; }
        #orario-dettaglio { font-size: 1.1rem; color: #cbd5e1; font-weight: 600; }

        /* Stati di colore Header */
        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; border-bottom-color: #ff4444 !important; }
        .errore-rete { background: #333333; border-bottom-color: #ffcc00 !important; } 
        
        .testo-aperto { color: #00ff88 !important; }
        .testo-chiuso { color: #ffffff !important; }
        .testo-errore { color: #ffcc00 !important; }
        
        .chiuso .croce { color: white; }
        .errore-rete .croce { color: #777777; animation: none; }

        /* --- CARD TURNI --- */
        #titolo-turni { text-align: center; color: #00ff88; font-size: 1.3rem; margin-bottom: 15px; text-transform: uppercase; }
        .card { background: #172a45; margin-bottom: 15px; padding: 15px; border-radius: 15px; border: 2px solid #233554; display: flex; align-items: center; }
        .card-info { flex: 1; }
        .card h3 { color: #00ff88; font-size: 1.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 1.3rem; color: #cbd5e1; }
        .qr-wrapper img { width: 90px; height: 90px; border-radius: 8px; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="header">
        <div id="clock">--:--:--</div>
        <div class="label-static">FARMACIA</div>
        <div id="txt-nome">
            <span class="croce">✚</span>
            <span id="nome-testo-dinamico">CARICAMENTO...</span>
            <span class="croce">✚</span>
        </div>
        <div id="stato-testo">---</div>
        <div id="orario-dettaglio">---</div>
    </div>

    <div id="container-main">
        <h2 id="titolo-turni">FARMACIE DI TURNO CHE EFFETTUANO SERVIZIO ASSISTENZIALE H24 NELLA ZONA</h2>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo">
        <div style="color: #0a192f; font-weight: 900; font-size: 2rem;">IN ATTESA DATI...</div>
    </div>

    <script>
        // --- BLOCCO EVENTI KIOSK ---
        // Disabilita il menu del tasto destro
        window.addEventListener('contextmenu', function (e) { 
            e.preventDefault(); 
        }, false);

        // Forza il fullscreen al primo click (utile se non si avvia Chrome/Edge tramite flag --kiosk)
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Fullscreen ignorato: ${err.message}`);
                });
            }
        }
        window.addEventListener('click', toggleFullScreen);
        // ---------------------------

        function updateClock() { 
            const ora = new Date().toLocaleTimeString('it-IT');
            if(document.getElementById('clock')) document.getElementById('clock').innerText = ora; 
        }
        setInterval(updateClock, 1000);

        const giorniSettimana = ["DOMENICA", "LUNEDÌ", "MARTEDÌ", "MERCOLEDÌ", "GIOVEDÌ", "VENERDÌ", "SABATO"];

        function estraiOrarioDaCSV(r, indiceGiorno) {
            if (indiceGiorno === 0) return r[14]; 
            if (indiceGiorno === 6) return r[13]; 
            return r[12]; 
        }

        function parseFasce(orarioStr) {
            if (!orarioStr) return [];
            let s = orarioStr.toUpperCase().trim();
            if (s.includes("CHIUSO")) return [];
            if (s.includes("H24") || s.includes("APERTO")) {
                return [{ start: 0, end: 1440, strInizio: "00:00", strFine: "24:00", h24: true }];
            }
            let fasce = [];
            let parti = s.split(',');
            for (let p of parti) {
                let ore = p.split('-');
                if (ore.length === 2) {
                    let startStr = ore[0].trim();
                    let endStr = ore[1].trim();
                    // Ottimizzazione silente per prevenire errori nel calcolo se i due punti mancano
                    let startMin = (startStr.includes(':')) ? parseInt(startStr.split(':')[0]) * 60 + (parseInt(startStr.split(':')[1]) || 0) : 0;
                    let endMin = (endStr.includes(':')) ? parseInt(endStr.split(':')[0]) * 60 + (parseInt(endStr.split(':')[1]) || 0) : 0;
                    fasce.push({ start: startMin, end: endMin, strInizio: startStr, strFine: endStr });
                }
            }
            return fasce.sort((a,b) => a.start - b.start);
        }

        function calcolaStatoApertura(r) {
            let adesso = new Date();
            let oraCorrente = adesso.getHours() * 60 + adesso.getMinutes();
            let indiceOggi = adesso.getDay();
            let fasceOggi = parseFasce(estraiOrarioDaCSV(r, indiceOggi));

            for (let f of fasceOggi) {
                if (f.h24) return { aperta: true, stato: "APERTO H24", dettaglio: "SERVIZIO CONTINUATO" };
                if (oraCorrente >= f.start && oraCorrente < f.end) {
                    return { aperta: true, stato: "APERTO", dettaglio: "APERTO FINO ALLE " + f.strFine };
                }
            }
            for (let f of fasceOggi) {
                if (f.start > oraCorrente) {
                    return { aperta: false, stato: "ATTUALMENTE CHIUSA", dettaglio: "RIAPRE ALLE ORE " + f.strInizio };
                }
            }
            for (let i = 1; i <= 7; i++) {
                let prossimoGiorno = (indiceOggi + i) % 7;
                let fasceFuture = parseFasce(estraiOrarioDaCSV(r, prossimoGiorno));
                if (fasceFuture.length > 0) {
                    let nomeGiorno = (i === 1) ? "DOMANI" : giorniSettimana[prossimoGiorno];
                    return { aperta: false, stato: "ATTUALMENTE CHIUSA", dettaglio: "RIAPRE " + nomeGiorno + " ALLE ORE " + fasceFuture[0].strInizio };
                }
            }
            return { aperta: false, stato: "ATTUALMENTE CHIUSA", dettaglio: "CONSULTARE ORARI" };
        }

        // Funzione per ripulire l'HTML prevenendo iniezioni di codice (XSS)
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        function processaDatiCSV(txt, isOffline = false) {
            const urlParams = new URLSearchParams(window.location.search);
            const MIO_ID = urlParams.get('id') || "RM002"; 

            const righe = txt.split(/\r?\n/).map(r => 
                r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                 .map(v => v.replace(/^"|"$/g, '').trim())
            );
            
            let turniHtml = "";
            let ownerTrovato = false;

            for (let i = 1; i < righe.length; i++) {
                const r = righe[i];
                if (!r[1]) continue;

                if (r[0] === MIO_ID && r[17] === "O") {
                    ownerTrovato = true;
                    document.getElementById('nome-testo-dinamico').innerText = r[1];
                    
                    const statoFarmacia = calcolaStatoApertura(r);
                    const headerEl = document.getElementById('header');
                    const statoEl = document.getElementById('stato-testo');
                    const dettEl = document.getElementById('orario-dettaglio');

                    // Imposta i colori in base allo stato
                    headerEl.className = statoFarmacia.aperta ? "aperto" : "chiuso";
                    
                    statoEl.innerText = statoFarmacia.stato;
                    statoEl.className = statoFarmacia.aperta ? "testo-aperto" : "testo-chiuso";
                    
                    // Se siamo offline, avvisa l'utente affianco all'orario
                    dettEl.innerText = statoFarmacia.dettaglio + (isOffline ? " [MODALITÀ OFFLINE]" : "");

                    const comandoCSV = r[5] ? r[5].trim() : ""; 
                    const footerEl = document.getElementById('footer-promo');
                    if (comandoCSV !== "") {
                        footerEl.innerHTML = `<iframe src="player.html?data=${encodeURIComponent(comandoCSV)}" style="width:100%; height:100%; border:none;" allow="autoplay; fullscreen"></iframe>`;
                    } else {
                        footerEl.innerHTML = `<div style="font-size:3.5rem; font-weight:900; color:#0a192f; text-align:center;">BENVENUTI</div>`;
                    }
                } 
                else if (r[17] === "T") {
                    const qr = r[4] ? `<div class="qr-wrapper"><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(r[4])}"></div>` : "";
                    
                    // Protezione XSS sui testi liberi
                    const nomeT = escapeHTML(r[1]);
                    const indT = escapeHTML(r[2]);

                    turniHtml += `
                        <div class="card">
                            <div class="card-info">
                                <div style="font-size:0.8rem; color:#94a3b8; font-weight:800;">FARMACIA DI TURNO</div>
                                <h3>${nomeT}</h3>
                                <p>${indT}</p>
                            </div>
                            ${qr}
                        </div>`;
                }
            }

            if (!ownerTrovato) {
                document.getElementById('nome-testo-dinamico').innerText = "ID " + MIO_ID + " NON TROVATO";
                document.getElementById('header').className = "errore-rete";
                document.getElementById('stato-testo').innerText = "---";
                document.getElementById('orario-dettaglio').innerText = "Verifica Codice ID";
            }
            
            document.getElementById('body-turni').innerHTML = turniHtml;
        }

        async function carica() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // --- GESTIONE ORIENTAMENTO ---
            const MIO_DIR = urlParams.get('dir') || "h"; 
            if (MIO_DIR === "v") {
                document.body.classList.add('v');
            } else {
                document.body.classList.remove('v');
            }

            const MIO_GID = urlParams.get('gid') || "0"; 

            const baseUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub";
            const urlCompleto = `${baseUrl}?gid=${MIO_GID}&single=true&output=csv`;

            try {
                // Fetch con timestamp per aggirare la cache del browser
                const res = await fetch(urlCompleto + "&t=" + Date.now());
                if (!res.ok) throw new Error("Risposta non OK dal server Google");
                
                const txt = await res.text();
                
                // --- SALVATAGGIO IN LOCAL STORAGE (CACHE OFFLINE) ---
                localStorage.setItem('cacheFarmacia', txt);
                
                processaDatiCSV(txt, false);

            } catch(e) { 
                console.error("Errore di Rete:", e); 
                
                // --- TENTATIVO DI RECUPERO DA CACHE ---
                const txtCache = localStorage.getItem('cacheFarmacia');
                
                if (txtCache) {
                    console.warn("Nessuna connessione. Caricamento dati in cache avviato.");
                    processaDatiCSV(txtCache, true);
                } else {
                    document.getElementById('nome-testo-dinamico').innerText = "ERRORE CONNESSIONE";
                    document.getElementById('header').className = "errore-rete";
                    document.getElementById('stato-testo').innerText = "OFFLINE";
                    document.getElementById('stato-testo').className = "testo-errore";
                    document.getElementById('orario-dettaglio').innerText = "Nessun dato in memoria. In attesa di rete...";
                    
                    document.getElementById('body-turni').innerHTML = `<h3 style="color:#ffcc00; text-align:center; margin-top:20px;">Riconnessione in corso...</h3>`;
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateClock();
            
            // Ritardo di 5 secondi all'avvio (Safe Start) per dare tempo alla rete post-reboot
            setTimeout(carica, 5000); 
            
            // Intervallo di aggiornamento a 10 minuti (600.000 ms)
            setInterval(carica, 600000); 
        });
    </script>
</body>
</html>
