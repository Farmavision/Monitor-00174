<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision - Standard Release</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; 
            background-color: #0a192f; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        #header { 
            height: 20vh; 
            padding: 20px;
            text-align: center; 
            border-bottom: 5px solid #00ff88; 
            display: flex; flex-direction: column; justify-content: center;
        }
        #clock { position: absolute; top: 15px; right: 20px; font-family: monospace; font-size: 2.5rem; color: #00ff88; }
        #header-nome { font-size: 3.5rem; margin: 0; text-transform: uppercase; font-weight: bold; }
        #header-orario { font-size: 1.8rem; margin-top: 10px; }

        .header-aperto { background: #064e3b; }
        .header-chiuso { background: #b91c1c; }

        /* BODY */
        #container-main { 
            height: 60vh; 
            padding: 30px; 
            overflow-y: auto; 
            background: #0d1e36;
        }
        .card { 
            background: #172a45; 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid #233554; 
            margin-bottom: 25px;
            text-align: center;
        }
        .card h3 { color: #00ff88; font-size: 2.2rem; margin: 0 0 10px 0; }
        .card p { color: #cbd5e1; font-size: 1.4rem; margin: 0 0 20px 0; }
        .qr img { width: 180px; height: 180px; background: white; padding: 10px; border-radius: 10px; }

        /* FOOTER */
        #footer-adv { 
            height: 20vh; 
            background: #ffffff; 
            color: #b91c1c;
            border-top: 5px solid #00ff88;
            display: flex; align-items: center; justify-content: center;
        }
        #adv-content { font-size: 3.5rem; font-weight: 900; text-align: center; text-transform: uppercase; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: #233554; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="header" class="header-aperto">
        <div id="clock">00:00</div>
        <h1 id="header-nome">CARICAMENTO</h1>
        <div id="header-orario">...</div>
    </div>

    <div id="container-main">
        <div id="body-turni"></div>
    </div>

    <div id="footer-adv">
        <div id="adv-content">OFFERTE IN ARRIVO...</div>
    </div>

    <script>
        async function aggiorna() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            const urlParams = new URLSearchParams(window.location.search);
            const mioID = (urlParams.get('id') || "RM001").toUpperCase();

            try {
                const res = await fetch(url + "&t=" + Date.now());
                const txt = await res.text();
                const righe = txt.split(/\r?\n/).map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                
                const MAP = { ID:0, NOME:1, ADDR:2, LINK:4, L_V:9, SAB:10, DOM:11, SERV:17 };
                const container = document.getElementById('body-turni');
                const giorno = new Date().getDay();
                let htmlTurni = "";

                for (let i = 1; i < righe.length; i++) {
                    const r = righe[i];
                    if (!r[MAP.NOME]) continue;

                    if (r[MAP.ID].toUpperCase() === mioID && r[MAP.SERV] === "O") {
                        document.getElementById('header-nome').innerText = r[MAP.NOME];
                        let orario = (giorno === 0) ? r[MAP.DOM] : (giorno === 6 ? r[MAP.SAB] : r[MAP.L_V]);
                        document.getElementById('header-orario').innerText = "OGGI: " + (orario || "NON DISPONIBILE");
                        document.getElementById('header').className = orario.toUpperCase().includes("CHIUSO") ? "header-chiuso" : "header-aperto";
                    } else if (r[MAP.SERV] === "T") {
                        const qr = r[MAP.LINK] ? `<div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(r[MAP.LINK])}"></div>` : "";
                        htmlTurni += `<div class="card"><h3>${r[MAP.NOME]}</h3><p>${r[MAP.ADDR]}</p>${qr}</div>`;
                    }
                }
                container.innerHTML = htmlTurni;
            } catch (e) { console.error(e); }
        }

        function updateClock() {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
            // Reset automatico alle 04:00
            if(d.getHours() === 4 && d.getMinutes() === 0) location.reload();
        }

        setInterval(updateClock, 1000);
        updateClock();
        aggiorna();
        setInterval(aggiorna, 60000);

        const promo = ["SCONTO 30% SOLARI", "PROMO INTEGRATORI 1+1", "ECG IN SEDE", "PRESSIONE GRATIS"];
        let pIdx = 0;
        setInterval(() => {
            document.getElementById('adv-content').innerText = promo[pIdx];
            pIdx = (pIdx + 1) % promo.length;
        }, 6000);
    </script>
</body>
</html>
