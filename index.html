<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision - Pro H24</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            background-color: #0a192f; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
            display: flex; flex-direction: column;
        }

        /* HEADER (25vh) */
        #header { 
            height: 25vh;
            padding: 20px; 
            text-align: center; 
            border-bottom: 10px solid #00ff88; 
            position: relative; 
            display: flex; flex-direction: column; justify-content: center;
            flex-shrink: 0;
            transition: background 0.5s ease;
        }

        #clock { position: absolute; top: 15px; right: 25px; font-family: monospace; font-size: 2rem; color: #00ff88; font-weight: bold; }

        .header-aperto { background: #064e3b !important; border-bottom-color: #00ff88 !important; }
        .header-chiuso { background: #b91c1c !important; border-bottom-color: #ffffff !important; }

        #header-nome { 
            font-size: 3.2rem; 
            margin: 5px 0; 
            text-transform: uppercase; 
            font-weight: 900; 
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .croce { color: #00ff88; font-size: 0.9em; animation: pulse 2s infinite; }
        .header-chiuso .croce, .header-chiuso #clock { color: white !important; }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #header-orario { font-size: 2rem; font-weight: 800; text-transform: uppercase; }

        /* BODY (55vh) */
        #container-main { 
            height: 55vh;
            padding: 25px 30px; 
            overflow-y: auto; 
            flex-grow: 1;
        }

        .titolo-sezione { 
            border-left: 10px solid #00ff88; 
            padding-left: 15px; 
            margin-bottom: 25px; 
            font-size: 1.5rem; 
            color: #8892b0; 
            font-weight: bold; 
            text-transform: uppercase;
        }

        .card { 
            background: #172a45; padding: 25px; border-radius: 20px; border: 3px solid #233554; 
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 15px; margin-bottom: 25px;
        }
        .card h3 { margin: 0; color: #00ff88; font-size: 2.5rem; text-transform: uppercase; }
        .card p { margin: 5px 0; color: #cbd5e1; font-size: 1.8rem; font-weight: 600; }
        .qr-container { background: white; padding: 10px; border-radius: 15px; }
        .qr-container img { width: 170px; height: 170px; display: block; }

        /* FOOTER (20vh) */
        #footer-promo {
            height: 25vh;
            background: white;
            color: #b91c1c;
            display: flex; align-items: center; justify-content: center;
            border-top: 10px solid #00ff88;
            flex-shrink: 0;
            padding: 0 20px;
        }
        #promo-text { font-size: 3.8rem; font-weight: 900; text-transform: uppercase; text-align: center; line-height: 1; }
    </style>
</head>
<body>
    <div id="header">
        <div id="clock">00:00:00</div>
        <h1 id="header-nome">
            <span class="croce">&#10010;</span>
            <span id="nome-farma">SINCRONIZZAZIONE</span>
            <span class="croce">&#10010;</span>
        </h1>
        <div id="header-orario">VERIFICA IN CORSO...</div>
    </div>

    <div id="container-main">
        <div class="titolo-sezione">ELENCO DELLE FARMACIE DI TURNO CHE EFFETTUANO SERVIZIO ASSISTENZIALE H24</div>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo">
        <div id="promo-text">OFFERTE IN CORSO</div>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        function controllaApertura(fasciaOraria) {
            if (!fasciaOraria || fasciaOraria.toUpperCase().includes("CHIUSO")) return false;
            if (fasciaOraria.toUpperCase().includes("H24") || fasciaOraria.toUpperCase().includes("APERTO")) return true;

            const oraAttuale = new Date();
            const adessoMinuti = (oraAttuale.getHours() * 60) + oraAttuale.getMinutes();
            
            const fasce = fasciaOraria.split(',');
            for (let f of fasce) {
                const p = f.trim().split('-');
                if (p.length === 2) {
                    const [hI, mI] = p[0].split(':').map(Number);
                    const [hF, mF] = p[1].split(':').map(Number);
                    const inizio = (hI * 60) + (mI || 0);
                    const fine = (hF * 60) + (mF || 0);
                    if (adessoMinuti >= inizio && adessoMinuti <= fine) return true;
                }
            }
            return false;
        }
