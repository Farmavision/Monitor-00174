<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="900">
    <title>Monitor Farmacia Universale</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0a192f; 
            color: white; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            /* Rende il mouse invisibile senza bloccare gli eventi */
            cursor: none !important; 
        }

        /* --- LAYOUT 18-50-32 --- */
        #header { 
            flex: 0 0 18vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border-bottom: 6px solid #00ff88; 
            position: relative;
            padding: 5px 0;
            transition: background-color 0.5s ease;
        }

        #container-main { 
            flex: 0 0 50vh; 
            padding: 20px; 
            overflow-y: auto; 
        }

        #footer-promo {
            flex: 0 0 32vh; 
            width: 100%;
            background-color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        /* --- STILI HEADER --- */
        #clock { font-size: 1.2rem; color: #00ff88; font-weight: bold; position: absolute; top: 10px; right: 20px; }
        
        .label-static { 
            font-size: 1.6rem; 
            color: #ffffff; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: -10px;
            opacity: 0.8;
        }

        #txt-nome { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
            font-size: 3.8rem; 
            font-weight: 900; 
            color: #ffffff; 
            text-transform: uppercase; 
            line-height: 1; 
            margin: 5px 0;
            text-align: center;
        }

        /* --- SUPPORTO ORIENTAMENTO VERTICALE --- */
        body.v { flex-direction: column; }
        body.v #header { flex: 0 0 22vh; padding: 10px; }
        body.v #txt-nome { font-size: 2.8rem; text-align: center; flex-wrap: wrap; line-height: 1.1; }
        body.v #container-main { flex: 0 0 48vh; }
        body.v #footer-promo { flex: 0 0 30vh; }

        /* --- CARD TURNI --- */
        #titolo-turni { text-align: center; color: #00ff88; font-size: 1.3rem; margin-bottom: 15px; text-transform: uppercase; }
        .card { 
            background: #172a45; 
            margin-bottom: 15px; 
            padding: 15px; 
            border-radius: 15px; 
            border: 2px solid #233554; 
            display: flex; 
            align-items: center; 
        }
        .card-info { flex: 1; }
        .card h3 { color: #00ff88; font-size: 1.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 1.3rem; color: #cbd5e1; }
        .qr-wrapper img { width: 90px; height: 90px; border-radius: 8px; border: 2px solid white; }

        /* --- ANIMAZIONI E STATI --- */
        .croce { color: #00ff88; font-size: 1.2em; animation: pulse-farmacia 2s infinite ease-in-out; }
        @keyframes pulse-farmacia { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        #stato-testo { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; }
        #orario-dettaglio { font-size: 1.1rem; color: #cbd5e1; font-weight: 600; }

        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; border-bottom-color: #ff4444 !important; }
        .errore-rete { background: #333333; border-bottom-color: #777777 !important; }
        
        .testo-aperto { color: #00ff88 !important; }
        .testo-chiuso { color: #ffffff !important; }
        .testo-errore { color: #ffcc00 !important; }
    </style>
</head>
<body>

    <div id="header">
        <div id="clock">--:--:--</div>
        <div class="label-static">FARMACIA</div>
        <div id="txt-nome">
            <span class="croce">✚</span>
            <span id="nome-testo-dinamico">CARICAMENTO...</span>
            <span class="croce">✚</span>
        </div>
        <div id="stato-testo">---</div>
        <div id="orario-dettaglio">---</div>
    </div>

    <div id="container-main">
        <h2 id="titolo-turni">FARMACIE DI TURNO CHE EFFETTUANO SERVIZIO ASSISTENZIALE H24 NELLA ZONA</h2>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo">
        <div style="color: #0a192f; font-weight: 900; font-size: 2rem;">IN ATTESA DATI...</div>
    </div>

    <script>
        // Funzione Clock
        function updateClock() { 
            const ora = new Date().toLocaleTimeString('it-IT');
            if(document.getElementById('clock')) document.getElementById('clock').innerText = ora; 
        }
        setInterval(updateClock, 1000);

        // Funzioni Logica Orari (Semplificate per stabilità)
        const giorniSettimana = ["DOMENICA", "LUNEDÌ", "MARTEDÌ", "MERCOLEDÌ", "GIOVEDÌ", "VENERDÌ", "SABATO"];

        function estraiOrarioDaCSV(r, indiceGiorno) {
            return (indiceGiorno === 0) ? r[14] : (indiceGiorno === 6) ? r[13] : r[12]; 
        }

        function parseFasce(orarioStr) {
            if (!orarioStr) return [];
            let s = orarioStr.toUpperCase().trim();
            if (s.includes("CHIUSO")) return [];
            if (s.includes("H24") || s.includes("APERTO")) return [{ start: 0, end: 1440, strInizio: "00:00", strFine: "24:00", h24: true }];
            let fasce = [];
            let parti = s.split(',');
            for (let p of parti) {
                let ore = p.split('-');
                if (ore.length === 2) {
                    let startMin = parseInt(ore[0].split(':')[0]) * 60 + (parseInt(ore[0].split(':')[1]) || 0);
                    let endMin = parseInt(ore[1].split(':')[0]) * 60 + (parseInt(ore[1].split(':')[1]) || 0);
                    fasce.push({ start: startMin, end: endMin, strInizio: ore[0].trim(), strFine: ore[1].trim() });
                }
            }
            return fasce.sort((a,b) => a.start - b.start);
        }

        async function carica() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('dir') === "v") document.body.classList.add('v');

            const MIO_ID = urlParams.get('id') || "RM002"; 
            const MIO_GID = urlParams.get('gid') || "0"; 
            const urlCompleto = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=${MIO_GID}&single=true&output=csv&t=${Date.now()}`;

            try {
                const res = await fetch(urlCompleto);
                const txt = await res.text();
                const righe = txt.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                
                let turniHtml = "";
                let ownerTrovato = false;

                for (let i = 1; i < righe.length; i++) {
                    const r = righe[i];
                    if (r[0] === MIO_ID && r[17] === "O") {
                        ownerTrovato = true;
                        document.getElementById('nome-testo-dinamico').innerText = r[1];
                        const footerEl = document.getElementById('footer-promo');
                        footerEl.innerHTML = r[5] ? `<iframe src="player.html?data=${encodeURIComponent(r[5])}" style="width:100%; height:100%; border:none;"></iframe>` : `<div style="font-size:3.5rem; font-weight:900; color:#0a192f;">BENVENUTI</div>`;
                    } else if (r[17] === "T") {
                        turniHtml += `<div class="card"><div class="card-info"><h3>${r[1]}</h3><p>${r[2]}</p></div></div>`;
                    }
                }
                document.getElementById('body-turni').innerHTML = turniHtml;
            } catch(e) { console.error(e); }
        }

        window.onload = () => { updateClock(); carica(); setInterval(carica, 60000); };
    </script>
</body>
</html>
