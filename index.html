<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a192f; color: white; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- LAYOUT 18-50-32 --- */
        #header { 
            flex: 0 0 18vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-bottom: 6px solid #00ff88; position: relative;
            padding: 5px 0;
        }

        #container-main { 
            flex: 0 0 50vh; 
            padding: 20px; 
            overflow-y: auto; 
        }

        #footer-promo {
            flex: 0 0 32vh; 
            width: 100%;
            background-color: white; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- STILI HEADER --- */
        #clock { position: absolute; top: 10px; right: 20px; font-size: 1.4rem; color: #00ff88; font-family: monospace; }
       .label-static { 
    font-size: 2.0rem; 
    color: #94a3b8; 
    font-weight: 800; 
    text-transform: uppercase; 
    letter-spacing: 2px; 
    margin-bottom: 0px; /* <--- PORTALO A 0 o -5px */
}

        #txt-nome { 
            display: flex; align-items: center; justify-content: center; gap: 50px;
            font-size: 4.0rem; font-weight: 900; color: #ffffff; 
            text-transform: uppercase; line-height: 1.1; margin: 0px 0;
        }

        .croce { color: #00ff88; font-size: 1.5em; animation: pulse-farmacia 2s infinite ease-in-out; }
        @keyframes pulse-farmacia { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        #stato-testo { font-size: 2.0rem; font-weight: 900; text-transform: uppercase; }
        #orario-dettaglio { font-size: 1.2rem; color: #cbd5e1; font-weight: 600; }

        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; border-bottom-color: #ff4444 !important; }
        .testo-aperto { color: #00ff88 !important; }
        .testo-chiuso { color: #ffffff !important; }
        .chiuso .croce { color: white; }

        /* --- CARD --- */
        #titolo-turni { text-align: center; color: #00ff88; font-size: 1.4rem; margin-bottom: 15px; }
        .card { background: #172a45; margin-bottom: 15px; padding: 15px; border-radius: 15px; border: 2px solid #233554; display: flex; align-items: center; }
        .card-info { flex: 1; }
        .card h3 { color: #00ff88; font-size: 1.8rem; text-transform: uppercase; }
        .card p { font-size: 1.3rem; color: #cbd5e1; }
        .qr-wrapper img { width: 90px; height: 90px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="header" class="chiuso">
        <div id="clock">--:--:--</div>
        <div class="label-static">FARMACIA</div>
        <div id="txt-nome">
            <span class="croce">✚</span>
            <span id="nome-testo-dinamico">CARICAMENTO...</span>
            <span class="croce">✚</span>
        </div>
        <div id="stato-testo">---</div>
        <div id="orario-dettaglio">---</div>
    </div>

    <div id="container-main">
        <h2 id="titolo-turni">FARMACIE DI TURNO CHE EFFETTUANO SERVIZIO ASSISTENZIALE H24 NELLE VICINANZE</h2>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo"></div>

    <script>
        // Prende l'ID dall'URL o usa RM002 (come vedo dai tuoi screenshot)
        const urlParams = new URLSearchParams(window.location.search);
        const MIO_ID = urlParams.get('id') || "RM002"; 

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        function isAperta(cella) {
            if (!cella) return false;
            const s = cella.toUpperCase();
            if (s.includes("H24") || s.includes("APERTO")) return true;
            try {
                const adesso = new Date();
                const min = adesso.getHours() * 60 + adesso.getMinutes();
                const fasce = s.split(',');
                for (let f of fasce) {
                    const p = f.trim().split('-');
                    if (p.length === 2) {
                        const mS = parseInt(p[0].split(':')[0])*60 + (parseInt(p[0].split(':')[1])||0);
                        const mE = parseInt(p[1].split(':')[0])*60 + (parseInt(p[1].split(':')[1])||0);
                        if (min >= mS && min <= mE) return true;
                    }
                }
            } catch(e) { return false; }
            return false;
        }

        async function carica() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            try {
                const res = await fetch(url + "&t=" + Date.now());
                const txt = await res.text();
                // Parsing CSV robusto
                const righe = txt.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                
                let turniHtml = "";
                const giorno = new Date().getDay(); 
                let ownerTrovato = false;

                for (let i = 1; i < righe.length; i++) {
                    const r = righe[i];
                    if (!r[1]) continue;

                    // CONTROLLO OWNER
                    if (r[0] === MIO_ID && r[17] === "O") {
                        ownerTrovato = true;
                        document.getElementById('nome-testo-dinamico').innerText = r[1];
                        
                        const orarioOggi = (giorno === 0) ? r[14] : (giorno === 6 ? r[13] : r[12]);
                        const aperta = isAperta(orarioOggi);
                        
                        const headerEl = document.getElementById('header');
                        const statoEl = document.getElementById('stato-testo');
                        const dettEl = document.getElementById('orario-dettaglio');

                        if (aperta) {
                            headerEl.className = "aperto";
                            statoEl.innerText = "APERTO";
                            statoEl.className = "testo-aperto";
                            dettEl.innerText = "ORARIO DI OGGI: " + (orarioOggi || "H24");
                        } else {
                            headerEl.className = "chiuso";
                            statoEl.innerText = "ATTUALMENTE CHIUSA";
                            statoEl.className = "testo-chiuso";
                            let primaOra = orarioOggi ? (orarioOggi.includes('-') ? orarioOggi.split('-')[0].trim() : orarioOggi) : "--:--";
                            dettEl.innerText = "RIAPRE ALLE ORE " + primaOra;
                        }

                        const urlFooter = r[5] ? r[5].trim() : ""; 
                        const footerEl = document.getElementById('footer-promo');
                        if (urlFooter.startsWith('http')) {
                            footerEl.innerHTML = `<iframe src="${urlFooter}" style="width:100%; height:100%; border:none;"></iframe>`;
                        } else {
                            footerEl.innerHTML = `<div style="font-size:2rem; font-weight:900; color:#b91c1c;">${urlFooter || "BENVENUTI"}</div>`;
                        }
                    } 
                    // CONTROLLO TURNI
                    else if (r[17] === "T") {
                        const qr = r[4] ? `<div class="qr-wrapper"><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(r[4])}"></div>` : "";
                        turniHtml += `
                            <div class="card">
                                <div class="card-info">
                                    <div style="font-size:0.8rem; color:#94a3b8; font-weight:800;">FARMACIA</div>
                                    <h3>${r[1]}</h3>
                                    <p>${r[2]}</p>
                                </div>
                                ${qr}
                            </div>`;
                    }
                }

                if (!ownerTrovato) {
                    document.getElementById('nome-testo-dinamico').innerText = "ID " + MIO_ID + " NON TROVATO";
                }

                document.getElementById('body-turni').innerHTML = turniHtml;
            } catch(e) { 
                console.error("Errore:", e); 
                document.getElementById('nome-testo-dinamico').innerText = "ERRORE CONNESSIONE";
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateClock();
            carica();
            setInterval(carica, 45000);
        });
    </script>
</body>
</html>
