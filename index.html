<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision 17" - Footer 25</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a192f; 
            color: white; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- RIPARTIZIONE ALTEZZE (TOTALE 100%) --- */
        #header { 
            height: 20vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-bottom: 8px solid #00ff88;
            position: relative;
            flex-shrink: 0;
        }
        #container-main { 
            height: 55vh; 
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }
        #footer-promo { 
            height: 25vh; 
            background: white; 
            color: #b91c1c; 
            display: flex; justify-content: center; align-items: center;
            border-top: 8px solid #00ff88;
            flex-shrink: 0;
        }

        /* HEADER E CROCI */
        #clock { position: absolute; top: 10px; right: 20px; font-size: 1.8rem; color: #00ff88; font-family: monospace; font-weight: bold; }
        #nome-farma { 
            font-size: 2.8rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        .croce { color: #00ff88; font-size: 1.1em; animation: pulse 2s infinite; }
        .chiuso .croce, .chiuso #clock { color: white !important; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* STATI COLORE */
        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; border-bottom-color: white !important; }
        #stato-orario { font-size: 1.6rem; margin-top: 5px; font-weight: bold; text-transform: uppercase; }

        /* --- CARD MODIFICATA: TESTO SX, QR DX --- */
        .titolo-sezione { border-left: 8px solid #00ff88; padding-left: 15px; margin-bottom: 20px; font-size: 1.2rem; color: #8892b0; font-weight: bold; text-transform: uppercase; }
        
        .card { 
            background: #172a45; 
            margin-bottom: 25px; 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid #233554; 
            display: flex;            /* Allineamento orizzontale */
            align-items: center; 
            justify-content: space-between; /* Spinge il QR a destra */
            gap: 20px; 
        }

        .card-info { 
            text-align: left;         /* Testo a sinistra */
            flex-grow: 1; 
        }

        .card h3 { color: #00ff88; font-size: 2.2rem; text-transform: uppercase; margin: 0; }
        .card p { font-size: 1.6rem; color: #cbd5e1; font-weight: 600; margin-top: 5px; }
        
        .qr-wrapper { 
            background: white; 
            padding: 8px; 
            border-radius: 12px; 
            flex-shrink: 0; 
        }
        .qr-wrapper img { width: 120px; height: 120px; display: block; }
