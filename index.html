<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision 00174 - Vertical Final</title>
    <style>
        /* OTTIMIZZAZIONE PER MONITOR VERTICALE 9:16 */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #0a192f; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #brand-top { text-align: center; padding: 25px 0 10px 0; font-size: 1.8em; font-weight: 900; letter-spacing: 8px; color: #ffffff; }
        #brand-top span { color: #00ff88; }

        #header { 
            padding: 50px 20px; 
            text-align: center; 
            border-bottom: 12px solid #00ff88; 
            position: relative; 
            transition: background 0.5s ease; 
            flex-shrink: 0; 
        }

        #clock { 
            position: absolute; 
            top: 20px; 
            right: 30px; 
            font-family: monospace; 
            font-size: 2.5em; 
            color: #00ff88; 
            font-weight: bold; 
        }

        /* STATI COLORE */
        .header-aperto { background: #064e3b !important; border-bottom-color: #00ff88 !important; }
        .header-chiuso { background: #b91c1c !important; border-bottom-color: #ffffff !important; }

        #header-nome { 
            font-size: 5.5em; 
            margin: 35px 0; 
            text-transform: uppercase; 
            font-weight: 900; 
            line-height: 1.1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        /* CROCI GRECHE */
        .croce { 
            color: #00ff88; 
            font-size: 1.2em; 
            animation: pulse 2s infinite; 
        }
        .header-chiuso .croce { color: white; }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #header-orario { font-size: 2.8em; color: #ffffff; margin-top: 25px; font-weight: 800; text-transform: uppercase; }
        #header-note { font-size: 2.2em; color: #00ff88; margin-top: 20px; font-weight: 600; font-style: italic; }
        .header-chiuso #header-note { color: white; }

        #container-main { 
            padding: 50px 40px; 
            flex-grow: 1; 
            overflow-y: auto; 
        }

        .titolo-sezione { 
            border-left: 12px solid #00ff88; 
            padding-left: 30px; 
            margin-bottom: 50px; 
            font-size: 2em; 
            color: #8892b0; 
            font-weight: bold; 
            text-transform: uppercase; 
            line-height: 1.4;
        }

        #body-turni { display: flex; flex-direction: column; gap: 40px; }

        /* CARD TURNI VERTICALI */
        .card { 
            background: #172a45; 
            padding: 40px; 
            border-radius: 25px; 
            border: 3px solid #233554; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            gap: 25px;
        }

        .card-info h3 { margin: 0; color: #00ff88; font-size: 3.5em; }
        .card-info p { margin: 20px 0 0 0; color: #cbd5e1; font-size: 2.2em; }

        .qr-container { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            width: fit-content;
        }
        .qr-container img { width: 220px; height: 220px; display: block; }
        .qr-label { font-size: 1.4em; color: #0a192f; font-weight: 900; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="header" class="header-aperto">
        <div id="brand-top">FARMA<span>VISION</span></div>
        <div id="clock">00:00:00</div>
        <h1 id="header-nome">
            <span class="croce">&#10010;</span>
            <span id="nome-farma">CARICAMENTO...</span>
            <span class="croce">&#10010;</span>
        </h1>
        <div id="header-orario">ANALISI ORARI...</div>
        <div id="header-note"></div>
    </div>

    <div id="container-main">
        <div class="titolo-sezione">ELENCO DELLE FARMACIE DI TURNO CHE EFFETTUANO SERVIZIO ASSISTENZIALE H24</div>
        <div id="body-turni"></div>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        // Controllo date (Ferie/Estate)
        function checkRangeDate(rangeStr) {
            if (!rangeStr || rangeStr.trim() === "" || rangeStr.includes("APERTO")) return false;
            try {
                const oggi = new Date(); oggi.setHours(0,0,0,0);
                const parti = rangeStr.split('-');
                const pI = parti[0].trim().split('/');
                const pF = parti[1].trim().split('/');
                const inizio = new Date(oggi.getFullYear(), parseInt(pI[1], 10)-1, parseInt(pI[0], 10));
                const fine = new Date(oggi.getFullYear(), parseInt(pF[1], 10)-1, parseInt(pF[0], 10));
                if (fine < inizio) fine.setFullYear(fine.getFullYear() + 1);
                return oggi >= inizio && oggi <= fine;
            } catch(e) { return false; }
        }

        // Analisi orari complessi (es: 09:00-13:00, 15:00-19:00)
        function analizzaOrario(str) {
            if (!str || str.toUpperCase().includes("CHIUSO")) return { aperto: false, riapre: "" };
            if (str.toUpperCase().includes("H24") || str.toUpperCase().includes("APERTO")) return { aperto: true, riapre: "" };
            
            const ora = new Date();
            const minAdesso = ora.getHours() * 60 + ora.getMinutes();
            const blocchi = str.replace(/\s/g, '').split(',');
            let riapre = ""; let aperto = false;

            for (let b of blocchi) {
                const p = b.split('-');
                if (p.length === 2) {
                    const tI = p[0].split(':'); const tF = p[1].split(':');
                    const inMin = parseInt(tI[0], 10)*60 + parseInt(tI[1], 10);
                    const fiMin = parseInt(tF[0], 10)*60 + parseInt(tF[1], 10);
                    if (minAdesso >= inMin && minAdesso <= fiMin) {
                        aperto = true; break;
                    } else if (inMin > minAdesso && riapre === "") {
                        riapre = p[0];
                    }
                }
            }
            return { aperto: aperto, riapre: riapre };
        }

        async function aggiorna() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            const mioID = new URLSearchParams(window.location.search).get('id')?.toUpperCase() || "RM001";
            
            try {
                const res = await fetch(url + "&t=" + Date.now());
                const txt = await res.text();
                const righe = txt.split(/\r?\n/).map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                
                // Mappatura Colonne
                const MAP = { ID:0, NOME:1, ADDR:2, LINK:4, I_E:7, F_E:8, E_LV:9, E_S:10, E_D:11, I_LV:12, I_S:13, I_D:14, FER:15, NOTE:16, SERV:17 };
                
                const container = document.getElementById('body-turni');
                container.innerHTML = '';
                const oggi = new Date(); const day = oggi.getDay(); 

                for (let i = 1; i < righe.length; i++) {
                    const r = righe[i]; if (!r[MAP.NOME]) continue;

                    if (r[MAP.ID].toUpperCase() === mioID && r[MAP.SERV] === "O") {
                        document.getElementById('nome-farma').innerText = r[MAP.NOME];
                        document.getElementById('header-note').innerText = r[MAP.NOTE] || "";
                        
                        const isEstate = checkRangeDate(`${r[MAP.I_E]}-${r[MAP.F_E]}`);
                        let orarioString = isEstate 
                            ? (day===0 ? r[MAP.E_D] : (day===6 ? r[MAP.E_S] : r[MAP.E_LV])) 
                            : (day===0 ? r[MAP.I_D] : (day===6 ? r[MAP.I_S] : r[MAP.I_LV]));

                        const stato = analizzaOrario(orarioString);
                        const inFerie = checkRangeDate(r[MAP.FER]);

                        if (inFerie) {
                            document.getElementById('header').className = "header-chiuso";
                            document.getElementById('header-orario').innerText = "CHIUSO PER FERIE (" + r[MAP.FER] + ")";
                        } else if (!stato.aperto) {
                            document.getElementById('header').className = "header-chiuso";
                            document.getElementById('header-orario').innerText = "ATTUALMENTE CHIUSA" + (stato.riapre ? " - RIAPRE ALLE " + stato.riapre : "");
                        } else {
                            document.getElementById('header').className = "header-aperto";
                            document.getElementById('header-orario').innerText = "ORARIO DI APERTURA: " + orarioString;
                        }
                    } else if (r[MAP.SERV] === "T") {
                        const qr = r[MAP.LINK] ? `<div class="qr-container"><img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(r[MAP.LINK])}&bgcolor=ffffff"><div class="qr-label">MAPPA</div></div>` : "";
                        container.innerHTML += `<div class="card"><div class="card-info"><h3>${r[MAP.NOME]}</h3><p>${r[MAP.ADDR]}</p></div>${qr}</div>`;
                    }
                }
            } catch (e) { console.error("Errore Sync:", e); }
        }

        aggiorna(); setInterval(aggiorna, 30000);
    </script>
</body>
</html>
