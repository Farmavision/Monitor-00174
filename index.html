<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a192f; color: white; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- LAYOUT INDISTRUTTIBILE --- */
        #header { 
            flex: 0 0 26vh; /* Esattamente il 26% dello schermo */
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-bottom: 8px solid #00ff88; position: relative;
            padding: 10px 0;
        }

        #container-main { 
            flex: 1 1 auto; /* Prende tutto lo spazio rimanente, spingendo giù il footer */
            padding: 20px; 
            overflow-y: auto; 
        }

        #footer-promo {
            flex: 0 0 24vh; /* Esattamente il 24% dello schermo */
            width: 100%;
            background-color: white; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- STILI HEADER (4 RIGHE) --- */
        #clock { position: absolute; top: 10px; right: 20px; font-size: 1.8rem; color: #00ff88; font-family: monospace; }
        
        .label-static { 
            font-size: 1.2rem; color: #94a3b8; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px;
        }

        #txt-nome { 
            font-size: 3.8rem; font-weight: 900; color: #00ff88; 
            text-transform: uppercase; line-height: 1; margin-bottom: 8px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2); text-align: center;
        }

        #stato-testo { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        #orario-dettaglio { font-size: 1.6rem; color: #cbd5e1; font-weight: 600; margin-top: 4px; }

        /* Stati Colore */
        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; border-bottom-color: #ff4444 !important; }
        .testo-aperto { color: #00ff88 !important; }
        .testo-chiuso { color: #ffffff !important; }

        /* --- CARD & TITOLI --- */
        #titolo-turni { text-align: center; color: #00ff88; font-size: 1.8rem; margin-bottom: 20px; text-transform: uppercase; }
        
        .card { 
            background: #172a45; margin-bottom: 25px; padding: 20px; 
            border-radius: 20px; border: 2px solid #233554; 
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-info { flex: 1; text-align: left; display: flex; flex-direction: column; gap: 4px; }
        .label-fisso { font-size: 1.1rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .card h3 { color: #00ff88; font-size: 2.3rem; text-transform: uppercase; margin: 0; }
        .card p { font-size: 1.6rem; color: #cbd5e1; font-weight: 600; margin: 0; }

        .qr-wrapper { background: white; padding: 8px; border-radius: 12px; margin-left: 20px; flex-shrink: 0; }
        .qr-wrapper img { width: 120px; height: 120px; display: block; }

        #footer-promo iframe { width: 100%; height: 100%; border: none; display: block; }
        #promo-text-fallback { font-size: 2.5rem; font-weight: 900; color: #b91c1c; text-align: center; }
    </style>
</head>
<body>

    <div id="header" class="chiuso">
        <div id="clock">--:--:--</div>
        <div class="label-static">FARMACIA</div>
        <div id="txt-nome">CARICAMENTO...</div>
        <div id="stato-testo">---</div>
        <div id="orario-dettaglio">---</div>
    </div>

    <div id="container-main">
        <h2 id="titolo-turni">FARMACIE DI TURNO CHE PRESTANO SERVIZIO ASSISTENZIALE H24</h2>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const MIO_ID = urlParams.get('id') || "RM001"; 

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        function isAperta(cella) {
            if (!cella) return false;
            const s = cella.toUpperCase();
            if (s.includes("H24") || s.includes("APERTO")) return true;
            try {
                const adesso = new Date();
                const min = adesso.getHours() * 60 + adesso.getMinutes();
                const fasce = s.split(',');
                for (let f of fasce) {
                    const p = f.trim().split('-');
                    if (p.length === 2) {
                        const mS = parseInt(p[0].split(':')[0])*60 + (parseInt(p[0].split(':')[1])||0);
                        const mE = parseInt(p[1].split(':')[0])*60 + (parseInt(p[1].split(':')[1])||0);
                        if (min >= mS && min <= mE) return true;
                    }
                }
            } catch(e) { return false; }
            return false;
        }

        async function carica() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            try {
                const res = await fetch(url + "&t=" + Date.now());
                const txt = await res.text();
                const righe = txt.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
                
                let turniHtml = "";
                const giorno = new Date().getDay(); 

                for (let i = 1; i < righe.length; i++) {
                    const r = righe[i];
                    if (!r[1]) continue; // Salta righe vuote

                    try {
                        // --- LOGICA OWNER (La tua Farmacia) ---
                        if (r[0] === MIO_ID && r[17] === "O") {
                            document.getElementById('txt-nome').innerText = r[1];
                            const orarioOggi = (giorno === 0) ? r[14] : (giorno === 6 ? r[13] : r[12]);
                            const aperta = isAperta(orarioOggi);
                            
                            const headerEl = document.getElementById('header');
                            const statoEl = document.getElementById('stato-testo');
                            const dettEl = document.getElementById('orario-dettaglio');

                            if (aperta) {
                                headerEl.className = "aperto";
                                statoEl.innerText = "APERTO";
                                statoEl.className = "testo-aperto";
                                dettEl.innerText = "ORARIO DI OGGI: " + (orarioOggi || "H24");
                            } else {
                                headerEl.className = "chiuso";
                                statoEl.innerText = "ATTUALMENTE CHIUSA";
                                statoEl.className = "testo-chiuso";
                                
                                // Calcolo di Riapertura Blindato (non va più in crash)
                                let primaOra = "--:--";
                                if (orarioOggi) {
                                    const oStr = String(orarioOggi);
                                    primaOra = oStr.includes('-') ? oStr.split('-')[0].trim() : oStr;
                                }
                                dettEl.innerText = "RIAPRE ALLE ORE " + primaOra;
                            }

                            // --- LOGICA FOOTER DINAMICO ---
                            const urlFooter = r[5] ? r[5].trim() : ""; 
                            const footerEl = document.getElementById('footer-promo');
                            if (urlFooter.startsWith('http')) {
                                footerEl.innerHTML = `<iframe src="${urlFooter}" scrolling="no"></iframe>`;
                            } else {
                                footerEl.innerHTML = `<div id="promo-text-fallback">${urlFooter || "BENVENUTI IN FARMACIA"}</div>`;
                            }
                        } 
                        
                        // --- LOGICA TURNI (Card) ---
                        else if (r[17] === "T") {
                            const qr = r[4] ? `<div class="qr-wrapper"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(r[4])}"></div>` : "";
                            turniHtml += `
                                <div class="card">
                                    <div class="card-info">
                                        <div class="label-fisso">FARMACIA</div>
                                        <h3>${r[1]}</h3>
                                        <p>${r[2]}</p>
                                    </div>
                                    ${qr}
                                </div>`;
                        }
                    } catch (rowError) {
                        console.error("Errore nell'elaborazione della riga:", rowError);
                        // Se una riga ha un problema, il programma salta l'errore e continua a stampare le altre!
                    }
                }
                
                // Inserisce le card solo alla fine
                document.getElementById('body-turni').innerHTML = turniHtml;
                
            } catch(e) { console.error("Errore Fetch:", e); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateClock();
            carica();
            setInterval(carica, 45000);
        });
    </script>
</body>
</html>
