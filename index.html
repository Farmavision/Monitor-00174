<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision 00174 - Finale</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #0a192f; color: white; transition: background 0.5s; overflow-x: hidden; }
        
        #brand-label { position: absolute; top: 15px; left: 20px; font-size: 1.2em; font-weight: 800; letter-spacing: 3px; color: #8892b0; }
        #brand-label span { color: #00ff88; }

        #header { padding: 60px 20px 30px 20px; text-align: center; border-bottom: 4px solid #00ff88; position: relative; background: #172a45; }
        #clock { position: absolute; top: 15px; right: 25px; font-family: monospace; font-size: 1.6em; color: #00ff88; font-weight: bold; }
        
        #header-nome { font-size: 3.5em; margin: 0; text-transform: uppercase; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .croce { color: #00ff88; font-size: 0.8em; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Nuova riga Orario */
        #header-orario { font-size: 1.8em; color: #ffffff; margin-top: 10px; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        #header-note { font-size: 1.3em; color: #00ff88; margin-top: 5px; font-weight: 500; font-style: italic; }
        
        #container-main { padding: 30px; max-width: 1150px; margin: auto; }
        .titolo-sezione { border-left: 6px solid #00ff88; padding-left: 20px; margin: 30px 0 25px 0; font-size: 1.4em; color: #8892b0; text-transform: uppercase; line-height: 1.4; }
        
        #body-turni { display: flex; flex-direction: column; gap: 20px; }
        
        .card { background: #172a45; padding: 25px; border-radius: 15px; border: 1px solid #233554; display: flex; justify-content: space-between; align-items: center; }
        .card-info h3 { margin: 0; color: #00ff88; font-size: 2.2em; text-transform: uppercase; }
        .card-info p { margin: 10px 0 0 0; color: #cbd5e1; font-size: 1.4em; }

        .qr-container { text-align: center; background: white; padding: 10px; border-radius: 12px; margin-left: 25px; min-width: 140px; }
        .qr-container img { width: 130px; height: 130px; display: block; }
        .qr-label { font-size: 0.85em; color: #0a192f; font-weight: 900; margin-top: 6px; }

        @media (max-width: 800px) {
            #header-nome { font-size: 2.2em; }
            #header-orario { font-size: 1.4em; }
        }
    </style>
</head>
<body>
    <div id="brand-label">FARMA<span>VISION</span></div>
    <div id="clock">00:00:00</div>
    
    <div id="header">
        <h1 id="header-nome">
            <span class="croce">&#10010;</span>
            <span id="nome-farma">CARICAMENTO...</span>
            <span class="croce">&#10010;</span>
        </h1>
        <div id="header-orario">--:--</div>
        <div id="header-note">...</div>
    </div>

    <div id="container-main">
        <div class="titolo-sezione">
            Elenco delle farmacie di turno che prestano servizio assistenziale H24 nella giornata di oggi<br>
            <small style="font-size: 0.6em; opacity: 0.8;">(Fonte: Ordine dei Farmacisti di Roma)</small>
        </div>
        <div id="body-turni"></div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT');
        }
        setInterval(updateClock, 1000);
        updateClock();

        function safeSplitCSV(text) {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            return text.split(regex).map(v => v.replace(/^"|"$/g, '').trim());
        }

        async function aggiornaMonitor() {
            const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            const urlParams = new URLSearchParams(window.location.search);
            const mioID = urlParams.get('id')?.toUpperCase() || "RM001";

            try {
                const response = await fetch(csvUrl + "&t=" + Date.now());
                const csvText = await response.text();
                const righe = csvText.split(/\r?\n/);
                
                const container = document.getElementById('body-turni');
                container.innerHTML = '';
                let trovatoOwner = false;

                // MAPPATURA AGGIORNATA TAB 00174
                // J=9 (Orario Lun-Ven), N=13 (Note), O=14 (Servizio)
                const MAP = { ID: 0, NOME: 1, ADDR: 2, LINK: 4, ORA: 9, NOTE: 13, SERV: 14 };

                for (let i = 1; i < righe.length; i++) {
                    const riga = safeSplitCSV(righe[i]);
                    if (!riga[MAP.NOME] || riga[MAP.NOME] === "NOME_FARMACIA") continue;

                    const idFarma = riga[MAP.ID].toUpperCase();
                    const servizio = riga[MAP.SERV].toUpperCase();
                    const nome = riga[MAP.NOME];

                    if (servizio === "O" && idFarma === mioID) {
                        trovatoOwner = true;
                        document.body.style.backgroundColor = "#064e3b";
                        document.getElementById('nome-farma').innerText = nome;
                        document.getElementById('header-orario').innerText = "Orario oggi: " + (riga[MAP.ORA] || "Continuato");
                        document.getElementById('header-note').innerText = riga[MAP.NOTE] || "";
                    } 
                    else if (servizio === "T") {
                        const linkMaps = riga[MAP.LINK];
                        const qrUrl = linkMaps ? `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(linkMaps)}&bgcolor=ffffff` : "";
                        
                        container.innerHTML += `
                            <div class="card">
                                <div class="card-info">
                                    <h3>${nome}</h3>
                                    <p>${riga[MAP.ADDR] || ''}</p>
                                </div>
                                ${linkMaps ? `
                                <div class="qr-container">
                                    <img src="${qrUrl}" alt="QR">
                                    <div class="qr-label">MAPPA</div>
                                </div>` : ''}
                            </div>`;
                    }
                }

                if (!trovatoOwner) {
                    document.getElementById('nome-farma').innerText = "ID NON TROVATO";
                    document.getElementById('header-orario').innerText = "";
                }

            } catch (e) {
                console.error(e);
            }
        }

        aggiornaMonitor();
        setInterval(aggiornaMonitor, 60000);
    </script>
</body>
</html>
