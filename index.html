<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmacia Universale</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a192f; color: white; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- LAYOUT 18-50-32 --- */
        #header { 
            flex: 0 0 18vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-bottom: 6px solid #00ff88; position: relative;
            padding: 5px 0;
        }

        #container-main { 
            flex: 0 0 50vh; 
            padding: 20px; 
            overflow-y: auto; 
        }

        #footer-promo {
            flex: 0 0 32vh; 
            width: 100%;
            background-color: white; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- STILI HEADER --- */
        #clock { font-size: 1.2rem; color: #00ff88; font-weight: bold; position: absolute; top: 10px; right: 20px; }
        
        .label-static { 
            font-size: 1.6rem; 
            color: #ffffff; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: -10px;
            opacity: 0.8;
        }

        #txt-nome { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
            font-size: 3.8rem; 
            font-weight: 900; 
            color: #ffffff; 
            text-transform: uppercase; 
            line-height: 1; 
            margin: 5px 0;
        }

        .croce { color: #00ff88; font-size: 1.2em; animation: pulse-farmacia 2s infinite ease-in-out; }
        @keyframes pulse-farmacia { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        #stato-testo { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; }
        #orario-dettaglio { font-size: 1.1rem; color: #cbd5e1; font-weight: 600; }

        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; border-bottom-color: #ff4444 !important; }
        .testo-aperto { color: #00ff88 !important; }
        .testo-chiuso { color: #ffffff !important; }
        .chiuso .croce { color: white; }

        /* --- CARD TURNI --- */
        #titolo-turni { text-align: center; color: #00ff88; font-size: 1.3rem; margin-bottom: 15px; text-transform: uppercase; }
        .card { background: #172a45; margin-bottom: 15px; padding: 15px; border-radius: 15px; border: 2px solid #233554; display: flex; align-items: center; }
        .card-info { flex: 1; }
        .card h3 { color: #00ff88; font-size: 1.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 1.3rem; color: #cbd5e1; }
        .qr-wrapper img { width: 90px; height: 90px; border-radius: 8px; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="header">
        <div id="clock">--:--:--</div>
        <div class="label-static">FARMACIA</div>
        <div id="txt-nome">
            <span class="croce">✚</span>
            <span id="nome-testo-dinamico">CARICAMENTO...</span>
            <span class="croce">✚</span>
        </div>
        <div id="stato-testo">---</div>
        <div id="orario-dettaglio">---</div>
    </div>

    <div id="container-main">
        <h2 id="titolo-turni">FARMACIE DI TURNO NELLE VICINANZE</h2>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo">
        <div style="color: #0a192f; font-weight: 900; font-size: 2rem;">IN ATTESA DATI...</div>
    </div>

    <script>
        // --- CONFIGURAZIONE ---
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        const giorniSettimana = ["DOMENICA", "LUNEDÌ", "MARTEDÌ", "MERCOLEDÌ", "GIOVEDÌ", "VENERDÌ", "SABATO"];

        function estraiOrarioDaCSV(r, indiceGiorno) {
            if (indiceGiorno === 0) return r[14]; // Domenica
            if (indiceGiorno === 6) return r[13]; // Sabato
            return r[12]; // Lunedì-Venerdì
        }

        function parseFasce(orarioStr) {
            if (!orarioStr) return [];
            let s = orarioStr.toUpperCase().trim();
            if (s.includes("CHIUSO")) return [];
            if (s.includes("H24") || s.includes("APERTO")) {
                return [{ start: 0, end: 1440, strInizio: "00:00", strFine: "24:00", h24: true }];
            }
            let fasce = [];
            let parti = s.split(',');
            for (let p of parti) {
                let ore = p.split('-');
                if (ore.length === 2) {
                    let startStr = ore[0].trim();
                    let endStr = ore[1].trim();
                    let startMin = parseInt(startStr.split(':')[0]) * 60 + (parseInt(startStr.split(':')[1]) || 0);
                    let endMin = parseInt(endStr.split(':')[0]) * 60 + (parseInt(endStr.split(':')[1]) || 0);
                    fasce.push({ start: startMin, end: endMin, strInizio: startStr, strFine: endStr });
                }
            }
            return fasce.sort((a,b) => a.start - b.start);
        }
