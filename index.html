<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Farmavision</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #0a192f; color: white; overflow-x: hidden; }
        #header { padding: 40px 20px; text-align: center; border-bottom: 4px solid #00ff88; position: relative; background: #172a45; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        #clock { position: absolute; top: 15px; right: 25px; font-family: 'Courier New', monospace; font-size: 1.6em; color: #00ff88; font-weight: bold; }
        #header-nome { font-size: 3.5em; margin: 0; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #header-note { font-size: 1.4em; color: #00ff88; margin-top: 15px; font-weight: 500; }
        #container-main { padding: 30px; max-width: 1150px; margin: auto; }
        .titolo-sezione { border-left: 6px solid #00ff88; padding-left: 20px; margin: 40px 0 30px 0; font-size: 2em; color: #8892b0; text-transform: uppercase; font-weight: bold; }
        #body-turni { display: flex; flex-direction: column; gap: 25px; }
        .card { background: #172a45; padding: 25px; border-radius: 15px; border: 1px solid #233554; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #00ff88; }
        .card-info { flex: 1; }
        .card-info h3 { margin: 0; color: #00ff88; font-size: 2em; }
        .card-info p { margin: 12px 0 0 0; color: #cbd5e1; font-size: 1.3em; }
        .qr-container { text-align: center; background: white; padding: 10px; border-radius: 12px; margin-left: 30px; min-width: 140px; }
        .qr-container img { width: 130px; height: 130px; display: block; }
        .qr-label { font-size: 0.9em; color: #0a192f; font-weight: 800; margin-top: 6px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="clock">00:00:00</div>
    <div id="header">
        <h1 id="header-nome">SINCRONIZZAZIONE...</h1>
        <div id="header-note">Lettura dati tabella 00174 in corso</div>
    </div>
    <div id="container-main">
        <div class="titolo-sezione">Farmacie di Turno Aperte</div>
        <div id="body-turni"></div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT');
        }
        setInterval(updateClock, 1000);
        updateClock();

        function safeSplitCSV(text) {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            return text.split(regex).map(v => v.replace(/^"|"$/g, '').trim());
        }

        async function aggiornaMonitor() {
            const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv";
            const urlParams = new URLSearchParams(window.location.search);
            const mioID = urlParams.get('id')?.toUpperCase() || "RM001";

            try {
                const response = await fetch(csvUrl + "&t=" + Date.now());
                const csvText = await response.text();
                const righe = csvText.split(/\r?\n/);
                
                const container = document.getElementById('body-turni');
                container.innerHTML = '';
                let trovatoOwner = false;

                // Mappatura fissa basata su Screenshot 20:21:37
                const MAP = { ID: 0, NOME: 1, ADDR: 2, LINK: 5, NOTE: 13, SERV: 14 };

                for (let i = 1; i < righe.length; i++) {
                    const riga = safeSplitCSV(righe[i]);
                    if (!riga[MAP.NOME] || riga[MAP.NOME] === "NOME_FARMACIA") continue;

                    const idFarma = riga[MAP.ID].toUpperCase();
                    const servizio = riga[MAP.SERV].toUpperCase();
                    const nome = riga[MAP.NOME];

                    // LOGICA HEADER (MIA FARMACIA 'O')
                    if (servizio === "O" && idFarma === mioID) {
                        trovatoOwner = true;
                        document.body.style.backgroundColor = "#064e3b";
                        document.getElementById('header-nome').innerText = nome;
                        document.getElementById('header-note').innerText = riga[MAP.NOTE] || "SERVIZIO CONTINUATO";
                    } 
                    // LOGICA CARD (TURNI 'T')
                    else if (servizio === "T") {
                        const linkMaps = riga[MAP.LINK];
                        const qrUrl = linkMaps ? `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(linkMaps)}` : "";
                        
                        container.innerHTML += `
                            <div class="card">
                                <div class="card-info">
                                    <h3>${nome}</h3>
                                    <p>${riga[MAP.ADDR] || 'Indirizzo non disponibile'}</p>
                                </div>
                                ${linkMaps ? `
                                <div class="qr-container">
                                    <img src="${qrUrl}" alt="QR">
                                    <div class="qr-label">MAPPA</div>
                                </div>` : ''}
                            </div>`;
                    }
                }

                if (!trovatoOwner) {
                    document.getElementById('header-nome').innerText = "ID NON TROVATO";
                    document.getElementById('header-note').innerHTML = `L'ID <b>${mioID}</b> non è configurato come servizio 'O' nella colonna O.`;
                }

            } catch (e) {
                document.getElementById('header-nome').innerText = "ERRORE CONNESSIONE";
            }
        }

        aggiornaMonitor();
        setInterval(aggiornaMonitor, 60000);
    </script>
</body>
</html>
