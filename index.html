<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a192f; color: white; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- LAYOUT RICALIBRATO (18% - 50% - 32%) --- */
        #header { 
            flex: 0 0 18vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-bottom: 8px solid #00ff88; position: relative;
            padding: 5px 0;
            transition: background-color 0.5s ease;
        }

        #container-main { 
            flex: 0 0 50vh; 
            padding: 20px; 
            overflow-y: auto; 
        }

        #footer-promo {
            flex: 0 0 32vh; 
            width: 100%;
            background-color: white; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- STILI HEADER & CROCI --- */
        #clock { position: absolute; top: 10px; right: 20px; font-size: 1.6rem; color: #00ff88; font-family: monospace; }
        
        .label-static { 
            font-size: 1.1rem; color: #94a3b8; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px;
        }

        #txt-nome { 
            display: flex; align-items: center; justify-content: center; gap: 20px;
            font-size: 3.2rem; font-weight: 900; color: #00ff88; 
            text-transform: uppercase; line-height: 1; margin-bottom: 5px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2); 
        }

        .croce { 
            color: #00ff88; font-size: 0.8em; 
            animation: pulse-farmacia 2s infinite ease-in-out; 
        }

        @keyframes pulse-farmacia { 
            0%, 100% { opacity: 0.3; transform: scale(0.9); } 
            50% { opacity: 1; transform: scale(1.1); } 
        }

        #stato-testo { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        #orario-dettaglio { font-size: 1.5rem; color: #cbd5e1; font-weight: 600; }

        /* Stati Colore */
        .aperto { background: #064e3b; }
        .chiuso { background: #b91c1c; border-bottom-color: #ff4444 !important; }
        .testo-aperto { color: #00ff88 !important; }
        .testo-chiuso { color: #ffffff !important; }
        .chiuso .croce { color: white; } /* Croci bianche su fondo rosso */

        /* --- CARD & TITOLI --- */
        #titolo-turni { text-align: center; color: #00ff88; font-size: 1.6rem; margin-bottom: 20px; text-transform: uppercase; }
        
        .card { 
            background: #172a45; margin-bottom: 25px; padding: 20px; 
            border-radius: 20px; border: 2px solid #233554; 
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-info { flex: 1; text-align: left; display: flex; flex-direction: column; gap: 4px; }
        .label-fisso { font-size: 1.1rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .card h3 { color: #00ff88; font-size: 2.3rem; text-transform: uppercase; margin: 0; }
        .card p { font-size: 1.6rem; color: #cbd5e1; font-weight: 600; margin: 0; }

        .qr-wrapper { background: white; padding: 8px; border-radius: 12px; margin-left: 20px; flex-shrink: 0; }
        .qr-wrapper img { width: 120px; height: 120px; display: block; }

        #footer-promo iframe { width: 100%; height: 100%; border: none; display: block; }
        #promo-text-fallback { font-size: 2.5rem; font-weight: 900; color: #b91c1c; text-align: center; }
    </style>
</head>
<body>

    <div id="header" class="chiuso">
        <div id="clock">--:--:--</div>
        <div class="label-static">FARMACIA</div>
        <div id="txt-nome">
            <span class="croce">✚</span>
            <span id="nome-farma-testo">CARICAMENTO...</span>
            <span class="croce">✚</span>
        </div>
        <div id="stato-testo">---</div>
        <div id="orario-dettaglio">---</div>
    </div>

    <div id="container-main">
        <h2 id="titolo-turni">FARMACIE DI TURNO H24</h2>
        <div id="body-turni"></div>
    </div>

    <div id="footer-promo"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const MIO_ID = urlParams.get('id') || "RM001"; 

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }
        setInterval(updateClock, 1000);

        function isAperta(cella) {
            if (!cella) return false;
            const s = cella.toUpperCase();
            if (s.includes("H24") || s.includes("APERTO")) return true;
            try {
                const adesso = new Date();
                const min = adesso.getHours() * 60 + adesso.getMinutes();
                const fasce = s.split(',');
                for (let f of fasce) {
                    const p = f.trim().split('-');
                    if (p.length === 2) {
                        const mS = parseInt(p[0].split(':')[0])*60 + (parseInt(p[0].split(':')[1])||0);
                        const mE = parseInt(p[1].split(':')[0])*60 + (parseInt(p[1].split(':')[1])||0);
                        if (min >= mS && min <= mE) return true;
                    }
                }
            } catch(e) { return false; }
            return false;
        }
