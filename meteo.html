<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: white; 
        }
        .weather-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Forza il widget a essere grande e visibile */
        .weatherwidget-io {
            display: block;
            width: 90% !important;
            min-height: 150px; /* Altezza minima per forzare il rendering */
            transform: scale(2); /* Usiamo di nuovo scale ma con contenitore flessibile */
        }
    </style>
</head>
<body>

    <div class="weather-container">
        <a class="weatherwidget-io" 
           href="https://forecast7.com/it/41d9012d50/rome/" 
           data-label_1="ROMA" 
           data-label_2="METEO" 
           data-font="Roboto" 
           data-icons="Climacons Animated" 
           data-mode="Current" 
           data-theme="pure" >ROMA METEO</a>
        
        <script>
        !function(d,s,id){
            var js,fjs=d.getElementsByTagName(s)[0];
            if(!d.getElementById(id)){
                js=d.createElement(s);
                js.id=id;
                js.src='https://weatherwidget.io/js/widget.min.js';
                fjs.parentNode.insertBefore(js,fjs);
            }
        }(document,'script','weatherwidget-io-js');
        </script>
    </div>

    <script>
        // Forza il ricaricamento se il widget non appare dopo 2 secondi
        setTimeout(function() {
            if (typeof __weatherwidget_init === 'function') {
                __weatherwidget_init();
            }
        }, 2000);
    </script>

</body>
</html>
