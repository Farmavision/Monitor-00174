<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            overflow: hidden; 
            background-color: white; /* Lo sfondo bianco aiuta a mimetizzarsi */
        }

        .weather-crop {
            width: 100%;
            height: 100vh; /* Usa tutta l'altezza disponibile del footer */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        iframe {
            /* Dimensioni originali del widget prima dello zoom */
            width: 500px; 
            height: 200px;
            border: none;
            
            /* REGOLAZIONI: */
            /* 1. Lo zoom: aumentalo o diminuirlo se è troppo grande/piccolo */
            transform: scale(2.2); 
            
            /* 2. Lo spostamento: se vedi il widget tagliato in alto o in basso, 
               cambia il secondo valore (es. -10px o +10px) */
            transform-origin: center center;
            margin-top: -10px; 
            
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="weather-crop">
        <iframe src="https://www.meteoblue.com/it/tempo/widget/three/roma_italia_3169070?geoloc=fixed&nocurrent=0&noforecast=1&days=3&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=bright"  
                frameborder="0" scrolling="no" allowtransparency="true"></iframe>
    </div>

</body>
</html>
