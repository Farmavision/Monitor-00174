<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        /* Rimuoviamo ogni margine e forziamo l'altezza */
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #ffffff; /* Sfondo bianco per visibilità */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weather-container {
            width: 90%; /* Lasciamo un po' di margine ai lati */
            text-align: center;
        }

        /* Invece dello scale, usiamo uno zoom più compatibile */
        .weatherwidget-io {
            display: block;
            min-width: 100%;
            zoom: 1.8; /* Zoom moderno meno problematico dello scale */
        }
    </style>
</head>
<body>

    <div class="weather-container">
        <a class="weatherwidget-io" 
           href="https://forecast7.com/it/41d9012d50/rome/" 
           data-label_1="ROMA" 
           data-label_2="METEO" 
           data-font="Roboto" 
           data-icons="Climacons Animated" 
           data-mode="Current" 
           data-theme="pure" >ROMA METEO</a>
        
        <script>
        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
        </script>
    </div>

    <script>
        if (typeof __weatherwidget_init === 'function') {
            __weatherwidget_init();
        }
    </script>

</body>
</html>
