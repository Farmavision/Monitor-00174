<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            overflow: hidden; 
            background-color: white; 
        }
        .weather-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* NON usiamo scale, ma forziamo l'altezza del widget */
        .weatherwidget-io {
            display: block;
            width: 100% !important;
            min-height: 250px; /* Spazio vitale per lo script */
        }
    </style>
</head>
<body>

    <div class="weather-container">
        <a class="weatherwidget-io" 
           href="https://forecast7.com/it/41d9012d50/rome/" 
           data-label_1="ROMA" 
           data-label_2="METEO" 
           data-font="Roboto" 
           data-icons="Climacons Animated" 
           data-mode="Current" 
           data-theme="pure" 
           style="font-size: 32px;">ROMA METEO</a>
        
        <script>
        !function(d,s,id){
            var js,fjs=d.getElementsByTagName(s)[0];
            if(!d.getElementById(id)){
                js=d.createElement(s);
                js.id=id;
                js.src='https://weatherwidget.io/js/widget.min.js';
                fjs.parentNode.insertBefore(js,fjs);
            }
        }(document,'script','weatherwidget-io-js');
        </script>
    </div>

</body>
</html>
