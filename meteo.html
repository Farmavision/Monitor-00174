<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteo e News Farmacia</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #000; 
            color: white; 
            height: 100vh; 
            width: 100vw; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- AREA METEO (93% dell'altezza) --- */
        #weather-container {
            flex: 0 0 93vh; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #weather-widget {
            width: 98%;
            height: 95%;
            border-radius: 15px;
            border: none;
        }

        /* --- AREA NEWS (7% dell'altezza) --- */
        #news-ticker {
            flex: 0 0 7vh;
            width: 100%;
            background: #0a192f;
            border-top: 3px solid #00ff88;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            z-index: 9999; /* Forza la visibilità sopra ogni cosa */
        }

        .ticker-wrapper {
            display: inline-flex;
            white-space: nowrap;
            will-change: transform;
            animation: marquee 60s linear infinite;
        }

        .news-item {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 0 50px;
            display: flex;
            align-items: center;
            color: #ffffff;
        }

        .news-item::after {
            content: "✚";
            margin-left: 50px;
            color: #00ff88;
            font-size: 1.4rem;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
        }

        /* Sfumature per non far apparire le news dal nulla */
        #news-ticker::before, #news-ticker::after {
            content: "";
            position: absolute;
            top: 0;
            width: 100px;
            height: 100%;
            z-index: 10;
        }
        #news-ticker::before { left: 0; background: linear-gradient(to right, #000, transparent); }
        #news-ticker::after { right: 0; background: linear-gradient(to left, #000, transparent); }
    </style>
</head>
<body>

    <div id="weather-container">
        <iframe id="weather-widget" 
            src="https://www.meteoblue.com/it/tempo/widget/three/roma_italia_3169070?geoloc=fixed&nocurrent=0&noforecast=0&days=4&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=dark"  
            frameborder="0" scrolling="NO" allowtransparency="true">
        </iframe>
    </div>

    <div id="news-ticker">
        <div class="ticker-wrapper" id="ticker-content">
            <span class="news-item">Caricamento Ultime Notizie...</span>
            <span class="news-item">Caricamento Ultime Notizie...</span>
        </div>
    </div>

    <script>
        async function fetchNews() {
            const RSS_URL = "https://www.ansa.it/sito/ansait_rss.xml";
            // Usiamo un proxy per evitare blocchi CORS (importante!)
            const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.status === 'ok' && data.items.length > 0) {
                    const ticker = document.getElementById('ticker-content');
                    const newsHtml = data.items.map(item => `<span class="news-item">${item.title}</span>`).join('');
                    
                    // Raddoppio per loop infinito
                    ticker.innerHTML = newsHtml + newsHtml;
                    
                    // Regola velocità (12 secondi a notizia)
                    const duration = data.items.length * 12;
                    ticker.style.animationDuration = `${duration}s`;
                }
            } catch (e) {
                console.error("Errore news:", e);
                // Se fallisce, mostra un messaggio scorrevole predefinito
                const fallback = `<span class="news-item">Benvenuti in Farmacia</span>`.repeat(10);
                document.getElementById('ticker-content').innerHTML = fallback;
            }
        }

        fetchNews();
        setInterval(fetchNews, 900000); // Ogni 15 min
    </script>
</body>
</html>
