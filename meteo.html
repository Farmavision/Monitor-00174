<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset totale per FarmaVision */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body, html { 
            background-color: #000; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenitore ottimizzato per il rapporto 53:100 */
        #meteo-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Rimuoviamo i bordi per farlo sparire nel footer nero */
            background: #000;
        }

        /* L'iframe deve riempire lo spazio ma mantenersi centrato */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Forziamo la scala se il widget dovesse apparire troppo piccolo */
            transform: scale(1); 
            transform-origin: center;
        }
    </style>
</head>
<body>

    <div id="meteo-container">
        <iframe 
            src="https://www.meteoblue.com/it/tempo/widget/three/roma_italia_3169070?geoloc=fixed&nocurrent=0&noforecast=0&days=4&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=dark" 
            frameborder="0" 
            scrolling="NO" 
            allowtransparency="true">
        </iframe>
    </div>

    <script>
        // Refresh automatico ogni 2 ore per aggiornare i dati meteo
        setTimeout(() => { location.reload(); }, 7200000);
    </script>

</body>
</html>
