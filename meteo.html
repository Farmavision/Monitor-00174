<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteo e News Farmacia</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #000; 
            color: white; 
            height: 100vh; 
            width: 100vw; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- CONTENITORE METEO --- */
        #weather-container {
            flex: 1; /* Prende tutto lo spazio sopra la barra news */
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 6vh; /* Spazio per non sovrapporsi alle news */
        }

        /* Widget Meteo Esterno (Esempio con scritte grandi) */
        #weather-widget {
            width: 90%;
            height: 70%;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #1e293b;
        }

        /* --- BANDA NEWS DINAMICA --- */
        #news-ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 7vh; /* Altezza ottimale per la leggibilità */
            background: linear-gradient(to right, #0a192f, #000);
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 3px solid #00ff88;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .ticker-wrapper {
            display: inline-flex;
            white-space: nowrap;
            padding-left: 100%; /* Inizia fuori schermo */
            animation: marquee 50s linear infinite;
        }

        .news-item {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 0 60px;
            display: flex;
            align-items: center;
            color: #ffffff;
        }

        /* Separatore tra le notizie */
        .news-item::after {
            content: "✚"; /* Croce farmaceutica come separatore */
            margin-left: 60px;
            color: #00ff88;
            font-size: 1.5rem;
            animation: pulse-green 2s infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Overlay per sfumatura ai lati della barra news */
        #news-ticker::before, #news-ticker::after {
            content: "";
            position: absolute;
            top: 0;
            width: 100px;
            height: 100%;
            z-index: 2;
        }
