<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            overflow: hidden; 
            background-color: white; /* Lo sfondo bianco aiuta a mimetizzarsi */
        }

        .weather-crop {
            width: 100%;
            height: 100vh; /* Usa tutta l'altezza disponibile del footer */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        iframe {
            /* Dimensioni originali del widget prima dello zoom */
            width: 500px; 
            height: 200px;
            border: none;
            
            /* REGOLAZIONI: */
            /* 1. Lo zoom: aumentalo o diminuirlo se è troppo grande/piccolo */
            transform: scale(1.8); 
            
            /* 2. Lo spostamento: se vedi il widget tagliato in alto o in basso, 
               cambia il secondo valore (es. -10px o +10px) */
            transform-origin: center center;
            margin-top: -30px; 
            
            pointer-events: none;
        }
        /* --- BANDA NEWS DINAMICA --- */
#news-ticker {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 5vh; /* Altezza della banda */
    background: rgba(0, 0, 0, 0.8); /* Sfondo scuro semitrasparente */
    color: #00ff88; /* Verde farmacia per il testo */
    display: flex;
    align-items: center;
    overflow: hidden;
    border-top: 2px solid #00ff88;
    font-family: 'Segoe UI', sans-serif;
    font-weight: 700;
    z-index: 999;
}

.ticker-content {
    display: inline-block;
    white-space: nowrap;
    padding-left: 100%;
    animation: scroll-news 30s linear infinite; /* Velocità dello scorrimento */
    font-size: 1.5rem;
}

@keyframes scroll-news {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-100%, 0); }
}

/* Modifica al widget meteo per non essere coperto */
#weather-widget {
    height: 95vh; /* Riduciamo leggermente l'altezza per far spazio alla banda */
}
    </style>
</head>
<body>

    <div class="weather-crop">
        <iframe src="https://www.meteoblue.com/it/tempo/widget/three/roma_italia_3169070?geoloc=fixed&nocurrent=0&noforecast=1&days=3&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=bright"  
                frameborder="0" scrolling="no" allowtransparency="true"></iframe>
    </div>
<div id="news-ticker">
    <div class="ticker-content" id="news-text">
        +++ INFO FARMACIA: Ricordiamo ai gentili clienti che è attivo il servizio di prenotazione tramite WhatsApp +++ 
        ORARIO CONTINUATO DALLE 08:30 ALLE 20:00 +++ SCOPRI LE NOSTRE OFFERTE NEL REPARTO DERMOCOSMESI +++
    </div>
</div>
</body>
</html>
