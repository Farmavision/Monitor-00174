<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            height: 100%; width: 100%; 
            overflow: hidden;
            font-family: 'Arial Black', sans-serif; /* Font massiccio per la distanza */
            color: #ffffff;
        }

        #footer-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100%;
            width: 100%;
            padding: 0 5%;
        }

        .day-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Icona Meteo Enorme */
        .icon {
            font-size: 5vw; /* Si adatta alla larghezza del monitor */
            margin-bottom: 5px;
            filter: brightness(2);
        }

        /* Temperatura Grande e Chiara */
        .temp {
            font-size: 4.0vw; 
            font-weight: 900;
            letter-spacing: -2px;
        }

        .label {
            font-size: 2.0vw;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 5px;
        }

        /* Linea di separazione verticale tra i giorni */
        .separator {
            width: 2px;
            height: 50%;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="footer-container">
        <div class="day-box">
            <div class="label">Oggi</div>
            <div class="icon">☀️</div>
            <div class="temp">22°</div>
        </div>

        <div class="separator"></div>

        <div class="day-box">
            <div class="label">Domani</div>
            <div class="icon">⛅</div>
            <div class="temp">19°</div>
        </div>

        <div class="separator"></div>

        <div class="day-box">
            <div class="label">Gio</div>
            <div class="icon">☁️</div>
            <div class="temp">17°</div>
        </div>
    </div>

    <script>
        // Per rendere i dati reali, possiamo usare una fetch veloce 
        // Ma come primo test, verifica se questo layout statico è leggibile sul monitor.
        // Se lo vedi bene, colleghiamo i dati live dell'ANSA o OpenWeather.
        setTimeout(() => { location.reload(); }, 3600000);
    </script>
</body>
</html>
