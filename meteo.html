<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #000; 
            height: 100vh; 
            width: 100vw; 
            font-family: sans-serif; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* BANDA NEWS - LA POSIZIONIAMO PER PRIMA NEL CODICE */
        #news-ticker {
            position: fixed;
            bottom: 0; /* Attaccata al fondo */
            left: 0;
            width: 100%;
            height: 12vh; /* 12% dell'altezza totale */
            background: #000 !important;
            border-top: 5px solid #ff0000; /* BORDO ROSSO DI TEST - Se vedi questo, la banda c'è! */
            display: flex;
            align-items: center;
            z-index: 99999; /* Valore altissimo per stare SOPRA l'iframe */
        }

        .ticker-wrapper {
            display: inline-flex;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
        }

        .news-item {
            font-size: 2.5rem; 
            font-weight: 900;
            color: #ffffff !important;
            padding: 0 40px;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* CONTENITORE METEO - DEVE LASCIARE LO SPAZIO SOTTO */
        #container-meteo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 88vh; /* 88% di altezza, lascia il 12% per le news */
            z-index: 1;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="container-meteo">
        <iframe src="https://www.meteoblue.com/it/tempo/widget/three/roma_italia_3169070?geoloc=fixed&nocurrent=0&noforecast=0&days=4&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=dark"></iframe>
    </div>

    <div id="news-ticker">
        <div class="ticker-wrapper" id="ticker-content">
            <span class="news-item">+++ TEST VISIBILITÀ: SE LEGGI QUESTO LA BANDA FUNZIONA +++</span>
            <span class="news-item">+++ CARICAMENTO NOTIZIE ANSA IN CORSO +++</span>
            <span class="news-item">+++ TEST VISIBILITÀ: SE LEGGI QUESTO LA BANDA FUNZIONA +++</span>
            <span class="news-item">+++ CARICAMENTO NOTIZIE ANSA IN CORSO +++</span>
        </div>
    </div>

    <script>
        async function fetchAnsa() {
            try {
                // Usiamo un proxy diverso (cors-anywhere alternativo)
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.ansa.it/sito/ansait_rss.xml'));
                const data = await response.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                
                if(items.length > 0) {
                    let txt = "";
                    for(let i=0; i<12; i++) {
                        let title = items[i].querySelector("title").textContent;
                        txt += `<span class="news-item">${title.toUpperCase()}</span>`;
                    }
                    document.getElementById('ticker-content').innerHTML = txt + txt;
                }
            } catch(e) { console.log("Errore dati, resta il test."); }
        }

        // Prova a caricare dopo 3 secondi
        setTimeout(fetchAnsa, 3000);
    </script>
</body>
</html>
