<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            overflow: hidden; 
            background-color: white; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Il segreto: ritagliamo l'iframe di Meteoblue per nascondere i loghi */
        .weather-crop {
            width: 100%;
            height: 150px; /* Altezza della "striscia" */
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        iframe {
            width: 800px; /* Larghezza interna del widget */
            height: 250px;
            border: none;
            /* Lo spostiamo leggermente per centrare solo la parte con le icone */
            transform: scale(1.8); 
            pointer-events: none; /* Impedisce clic fastidiosi */
        }
    </style>
</head>
<body>

    <div class="weather-crop">
        <iframe src="https://www.meteoblue.com/it/tempo/widget/three/roma_italia_3169070?geoloc=fixed&nocurrent=0&noforecast=1&days=3&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=bright"  
                frameborder="0" scrolling="no" allowtransparency="true"></iframe>
    </div>

</body>
</html>
