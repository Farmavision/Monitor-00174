<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            background-color: #000; 
            height: 100%; width: 100%; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Zoomiamo leggermente per eliminare le scritte piccole ai bordi */
            overflow: hidden;
        }

        iframe {
            /* Usiamo il widget 'Daily' che è molto più semplice del 'Three' */
            width: 110%; 
            height: 150%; 
            border: none;
            /* Lo "zoomiamo" per far sparire i dettagli inutili e ingrandire le icone */
            transform: scale(0.85);
            transform-origin: center;
        }
    </style>
</head>
<body>

    <div id="container">
        <iframe 
            src="https://www.meteoblue.com/it/tempo/widget/daily/roma_italia_3169070?geoloc=fixed&days=4&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&precipunit=MILLIMETER&coloured=coloured&pictoicon=1&maxtemp=1&mintemp=1&wind=0&winddir=0&uv=0&humidity=0&precipitation=0&precipitationprobability=0&spot=0&pressure=0&layout=dark" 
            frameborder="0" 
            scrolling="NO" 
            allowtransparency="true">
        </iframe>
    </div>

    <script>
        setTimeout(() => { location.reload(); }, 7200000);
    </script>
</body>
</html>
