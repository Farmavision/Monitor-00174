<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #000; 
            height: 100vh; width: 100vw; 
            font-family: sans-serif; 
            overflow: hidden; 
        }

        /* METEO: lo limitiamo all'85% dell'altezza per lasciare un buco nero sotto */
        #container-meteo {
            height: 85vh;
            width: 100%;
            overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* BANDA NEWS: Posizionata in modo ASSOLUTO sul fondo */
        #news-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15vh; /* Molto alta per essere sicuri di vederla */
            background: #000;
            border-top: 6px solid #00ff88;
            display: flex;
            align-items: center;
            z-index: 9999; /* Sopra a ogni cosa */
        }

        .ticker-wrapper {
            display: inline-flex;
            white-space: nowrap;
            animation: marquee 40s linear infinite;
        }

        .news-item {
            font-size: 3rem; /* Testo ENORME per il test */
            font-weight: 900;
            color: #ffffff;
            padding: 0 50px;
            text-transform: uppercase;
        }

        .news-item::after { content: " ✚ "; color: #00ff88; margin-left: 40px; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <div id="container-meteo">
        <iframe src="https://www.meteoblue.com/it/tempo/widget/three/roma_italia_3169070?geoloc=fixed&nocurrent=0&noforecast=0&days=4&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=dark"></iframe>
    </div>

    <div id="news-ticker">
        <div class="ticker-wrapper" id="ticker-content">
            <span class="news-item">PROVA VISUALIZZAZIONE NEWS 1</span>
            <span class="news-item">PROVA VISUALIZZAZIONE NEWS 2</span>
            <span class="news-item">PROVA VISUALIZZAZIONE NEWS 3</span>
            <span class="news-item">PROVA VISUALIZZAZIONE NEWS 4</span>
        </div>
    </div>

    <script>
        // Questa funzione proverà a sostituire il testo di prova con le news vere
        async function caricaNews() {
            const feedAnsa = "https://www.ansa.it/sito/ansait_rss.xml";
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent(feedAnsa)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.getElementsByTagName("item");
                
                if (items.length > 0) {
                    let htmlNews = "";
                    for (let i = 0; i < 10; i++) {
                        let titolo = items[i].getElementsByTagName("title")[0].textContent;
                        htmlNews += `<span class="news-item">${titolo}</span>`;
                    }
                    document.getElementById('ticker-content').innerHTML = htmlNews + htmlNews;
                }
            } catch (e) {
                console.log("Errore news, resta testo di prova");
            }
        }

        // Aspetta 5 secondi prima di caricare le news vere, così vedi se il testo di prova appare
        setTimeout(caricaNews, 5000);
    </script>
</body>
</html>
