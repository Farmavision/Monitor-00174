<!DOCTYPE html>
<html>
<head>
    <style>
        /* Rimuove margini e rende lo sfondo trasparente */
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: transparent; 
            height: 100%;
        }
        /* Centra il widget verticalmente */
        .weather-container {
            display: flex;
            align-items: center;
            height: 100vh;
            width: 100%;
        }
        /* Ingrandisce il widget per la visibilità da vetrina */
        .weatherwidget-io {
            transform: scale(1.5); 
            transform-origin: center;
        }
    </style>
</head>
<body>

<div class="weather-container">
    <a class="weatherwidget-io" href="https://forecast7.com/it/41d8912d48/rome/" data-label_1="ROMA" data-label_2="METEO" data-font="Roboto" data-icons="Climacons Animated" data-mode="Current" data-theme="pure" >ROMA METEO</a>
    <script>
    !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
    </script>
</div>

</body>
</html>
