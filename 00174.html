<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmavision - Monitor Turni</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #001529; /* Blu notte elegante */
            --accent-color: #00ff88; /* Verde farmacia fluo */
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Evita scroll manuale */
        }

        /* Testata */
        header {
            height: 15vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            background: rgba(255,255,255,0.05);
            border-bottom: 2px solid var(--accent-color);
        }

        .logo { font-size: 2.5rem; font-weight: 800; color: var(--accent-color); }
        .clock { font-size: 2rem; }

        /* Area Principale */
        main {
            height: 70vh;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .farmacia-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 1s ease-in;
        }

        .info h2 { margin: 0; font-size: 2.2rem; text-transform: uppercase; }
        .info p { margin: 5px 0 0; font-size: 1.4rem; opacity: 0.8; }

        .qr-code img {
            width: 150px;
            height: 150px;
            border: 5px solid white;
            border-radius: 10px;
        }

        /* Messaggio di aggiornamento */
        #status-msg {
            text-align: center;
            margin-top: 10vh;
        }

        .numero-emergenza {
            color: #ff4d4f;
            font-size: 3rem;
            margin-top: 20px;
        }

        footer {
            height: 15vh;
            background: var(--accent-color);
            color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 800;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">FARMAVISION</div>
        <div class="clock" id="live-clock">00:00:00</div>
    </header>

    <main id="container">
        <div id="status-msg">
            <h1>Caricamento turni...</h1>
        </div>
    </main>

    <footer>
        SERVIZIO CONTINUATO - INQUADRA IL QR PER IL NAVIGATORE
    </footer>

    <script>
        // CONFIGURAZIONE: Incolla qui l'URL del tuo Google Sheet (esportato come JSON o CSV)
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQlKTJnX3hjix1tPqrzXixNG3SH203P8IMXe2DvoytmrXVMgqQ_mdF5BXD_wsfh7Jb1TfR4qT4Lu8DU/pub?gid=0&single=true&output=csv';

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('it-IT');
        }
        setInterval(updateClock, 1000);

        async function fetchTurni() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.json(); // Assumendo formato JSON
                
                const container = document.getElementById('container');
                
                if (!data || data.length === 0) {
                    // SE IL FOGLIO È VUOTO (PULIZIA EFFETTUATA)
                    container.innerHTML = `
                        <div id="status-msg">
                            <h1 style="font-size: 3rem;">AGGIORNAMENTO TURNI IN CORSO</h1>
                            <p style="font-size: 1.5rem;">Per urgenze immediate chiamare:</p>
                            <div class="numero-emergenza">112 / 118</div>
                            <p style="font-size: 1.2rem; margin-top:30px;">I nuovi turni saranno disponibili a breve.</p>
                        </div>
                    `;
                } else {
                    // SE CI SONO DATI
                    container.innerHTML = ''; // Pulisci
                    data.forEach(farmacia => {
                        const qrUrl = `https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=https://www.google.com/maps/search/${encodeURIComponent(farmacia.indirizzo)}`;
                        
                        container.innerHTML += `
                            <div class="farmacia-card">
                                <div class="info">
                                    <h2>${farmacia.nome}</h2>
                                    <p>${farmacia.indirizzo}</p>
                                    <p style="color:var(--accent-color)">Distanza: ${farmacia.distanza || 'Calcolo...'}</p>
                                </div>
                                <div class="qr-code">
                                    <img src="${qrUrl}" alt="QR Maps">
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                console.error("Errore recupero dati", error);
            }
        }

        // Aggiorna i dati ogni 5 minuti per non sovraccaricare il sistema
        setInterval(fetchTurni, 300000);
        fetchTurni(); // Primo avvio
    </script>
</body>
</html>
